<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Warren's Office — Pass 2</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'EB Garamond',Georgia,serif}
#canvas-wrap{position:fixed;inset:0}
canvas{display:block;width:100%!important;height:100%!important}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#caption{
  position:absolute;bottom:4%;left:50%;transform:translateX(-50%);
  font-family:'Roboto Mono',monospace;font-size:clamp(9px,1vw,12px);
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(220,190,130,0.6);white-space:nowrap;
  text-shadow:0 1px 4px rgba(0,0,0,0.8);
  transition:opacity 0.4s;
}
#location{
  position:absolute;top:3%;left:3%;
  font-family:'Roboto Mono',monospace;font-size:clamp(8px,0.9vw,11px);
  letter-spacing:2px;text-transform:uppercase;color:rgba(200,170,100,0.4);
}
#esc-hint{
  position:absolute;top:3%;right:3%;
  font-family:'Roboto Mono',monospace;font-size:clamp(8px,0.9vw,11px);
  letter-spacing:2px;text-transform:uppercase;color:rgba(200,170,100,0.3);
  display:none;pointer-events:all;cursor:pointer;
}
#esc-hint:hover{color:rgba(200,170,100,0.7)}

/* TRIVIUM PANEL */
#trivium{
  position:absolute;right:2%;top:50%;transform:translateY(-50%);
  width:clamp(180px,22vw,280px);
  background:rgba(250,245,235,0.96);
  border:1px solid #8b6520;border-left:4px solid #8b0000;
  padding:clamp(12px,1.5vw,20px);
  display:none;pointer-events:all;
  box-shadow:0 4px 24px rgba(0,0,0,0.35);
}
#trivium.show{display:block;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-50%) translateX(30px)}to{opacity:1;transform:translateY(-50%) translateX(0)}}
.tv-close{position:absolute;top:8px;right:12px;font-size:16px;color:#8b6520;cursor:pointer;line-height:1;font-family:'Roboto Mono',monospace}
.tv-close:hover{color:#8b0000}
.tv-section{margin-bottom:14px}
.tv-label{font-family:'Roboto Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#8b0000;margin-bottom:5px}
.tv-text{font-size:clamp(11px,1.1vw,13px);line-height:1.6;color:#1a1008}
.tv-divider{height:1px;background:#e0d4b0;margin:10px 0}

/* CROSSHAIR */
#crosshair{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:20px;height:20px;pointer-events:none;display:none;
}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(220,190,130,0.5)}
#crosshair::before{width:1px;height:100%;left:50%;top:0;transform:translateX(-50%)}
#crosshair::after{width:100%;height:1px;top:50%;left:0;transform:translateY(-50%)}

/* INTERACT HINT */
#interact-hint{
  position:absolute;left:50%;bottom:12%;transform:translateX(-50%);
  background:rgba(0,0,0,0.7);border:1px solid rgba(220,190,130,0.3);
  padding:6px 16px;
  font-family:'Roboto Mono',monospace;font-size:clamp(8px,0.9vw,11px);
  letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(220,190,130,0.8);
  display:none;pointer-events:none;
  transition:opacity 0.3s;
}

/* LOADING */
#loading{
  position:fixed;inset:0;background:#0a0804;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;transition:opacity 1s;
}
#loading.fade{opacity:0;pointer-events:none}
.load-name{font-family:'EB Garamond',serif;font-size:clamp(28px,4vw,48px);font-weight:600;color:#c8a850;letter-spacing:2px;margin-bottom:8px}
.load-sub{font-family:'Roboto Mono',monospace;font-size:clamp(8px,1vw,11px);letter-spacing:3px;text-transform:uppercase;color:rgba(200,170,100,0.4);margin-bottom:32px}
.load-bar-wrap{width:200px;height:2px;background:rgba(200,170,100,0.15)}
.load-bar{height:100%;background:#c8a850;width:0%;transition:width 0.3s}
</style>
</head>
<body>

<div id="loading">
  <div class="load-name">Warren's Office</div>
  <div class="load-sub">Kiewit Plaza &bull; Omaha, Nebraska</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
</div>

<div id="canvas-wrap"></div>

<div id="hud">
  <div id="location">Kiewit Plaza &bull; Office 2 &bull; Omaha, NE</div>
  <div id="esc-hint" onclick="goBack()">&#8592; Exit</div>
  <div id="caption">Walk with WASD or Arrow Keys &bull; Look with mouse &bull; Click objects to learn</div>
  <div id="crosshair"></div>
  <div id="interact-hint" id="interact-hint">Press F or Click to examine</div>
  <div id="trivium">
    <div class="tv-close" onclick="closeTrivium()">&#215;</div>
    <div id="tv-content"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── TRIVIUM DATA ──
var TRIVIUM = {
  warren: {
    label: "Warren Buffett",
    grammar: "93 years old. $130 billion net worth. Reads 500 pages every day. Has worked in this same office since 1962. No computer on the desk.",
    logic: "The newspaper stack, the annual reports, the Cherry Coke -- these are the inputs of a system that has compounded at 20% annually for 60 years. The TOO HARD pile is not laziness. It is the most important decision in investing: knowing exactly what you do not know.",
    rhetoric: "Define your circle of competence ruthlessly. Everything outside it goes in the TOO HARD pile. Everything inside it -- study until you know it better than anyone alive. Then wait. When the pitch comes, swing hard."
  },
  desk: {
    label: "The Desk",
    grammar: "Wooden desk. Newspaper stack. A pile labeled TOO HARD. A landline phone. One Cherry Coke. No Bloomberg terminal. No second monitor. No email.",
    logic: "Every piece of technology Wall Street considers essential, he has concluded is unnecessary. The phone is for rare outbound calls he initiates. He is never reactive. The person who controls the speed of the conversation controls the negotiation.",
    rhetoric: "Never let urgency be imposed from the outside. Think on your own schedule. The best investment decisions come from stillness, not speed."
  },
  graham: {
    label: "Benjamin Graham",
    grammar: "The Intelligent Investor. Columbia Business School professor. Warren Buffett's teacher, mentor, and first employer. Father of value investing.",
    logic: "Graham gave the world Mr. Market -- the manic-depressive business partner who offers to buy or sell his share of the business every day at a different price. When he is fearful, his prices are low. When he is euphoric, his prices are high. His mood is irrelevant to the underlying value.",
    rhetoric: "Always calculate what something is worth before you look at what it costs. In that order. Mr. Market cannot manipulate you if you already know the answer."
  },
  munger: {
    label: "Charlie Munger",
    grammar: "Vice Chairman, Berkshire Hathaway. Died 2023 at 99. Architecture degree. Self-taught investor. Built a mental model lattice across physics, biology, psychology, history, and mathematics.",
    logic: "Munger's core insight: the big money is not in activity. It is in sitting on your ass and doing nothing while great businesses compound. Most investors underperform not because they do too little -- but because they do too much.",
    rhetoric: "Learn something real from every discipline -- not surface knowledge, the actual mechanism. When you have 100 mental models, the world starts explaining itself. Invert. Always invert."
  },
  window: {
    label: "The Window",
    grammar: "Venetian blinds. South-facing. Omaha, Nebraska. He could afford floor-to-ceiling glass in any penthouse in any financial capital on earth.",
    logic: "He chose Omaha deliberately. Distance from Wall Street is distance from the noise. The blinds are half-closed -- not because he doesn't want to see the world, but because the world worth seeing is in the annual reports on his desk.",
    rhetoric: "Control your information diet with the same discipline you control your portfolio. Most of what comes through the window is noise. The signal is in the filings."
  },
  coke: {
    label: "Cherry Coke",
    grammar: "One Cherry Coke. Buffett drinks five of these a day. He has done so since 1986 when Berkshire bought 6.2% of Coca-Cola for $1.3 billion.",
    logic: "That stake is now worth over $25 billion. He didn't just invest in Coke -- he studied the psychology of brand loyalty, the mathematics of global distribution, and the economics of a product with inelastic demand. Then he bought it and held it for 40 years.",
    rhetoric: "The best investments are in businesses so simple a child could understand them, with moats so wide competitors cannot cross them, run by people you would trust with your family."
  }
};

var showTrivium = function(key) {
  var d = TRIVIUM[key];
  if (!d) return;
  var html = '<div style="font-family:\'EB Garamond\',serif;font-size:clamp(14px,1.4vw,18px);font-weight:600;color:#1a1008;margin-bottom:12px">' + d.label + '</div>';
  html += '<div class="tv-divider"></div>';
  html += '<div class="tv-section"><div class="tv-label">Grammar -- What</div><div class="tv-text">' + d.grammar + '</div></div>';
  html += '<div class="tv-section"><div class="tv-label">Logic -- Why</div><div class="tv-text">' + d.logic + '</div></div>';
  html += '<div class="tv-section"><div class="tv-label">Rhetoric -- The Move</div><div class="tv-text">' + d.rhetoric + '</div></div>';
  document.getElementById('tv-content').innerHTML = html;
  document.getElementById('trivium').classList.add('show');
};

var closeTrivium = function() {
  document.getElementById('trivium').classList.remove('show');
};

var goBack = function() {
  window.location.href = 'plc-capital.html';
};

// ── THREE.JS SCENE ──
var scene, camera, renderer, clock;
var moveF=false, moveB=false, moveL=false, moveR=false;
var pitch=0, yaw=0;
var isLocked=false;
var raycaster, interactables=[], hovered=null;
var WALK_SPEED=2.5, SPRINT=4.5;

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2a1e0e);
  scene.fog = new THREE.Fog(0x1a1208, 8, 22);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 50);
  camera.position.set(0, 1.65, 6);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('canvas-wrap').appendChild(renderer.domElement);

  clock = new THREE.Clock();
  raycaster = new THREE.Raycaster();

  buildScene();
  setupLights();
  setupControls();

  window.addEventListener('resize', onResize);
  animate();
}

function tex(color, rough, metal) {
  var m = new THREE.MeshStandardMaterial({color:color, roughness:rough||0.8, metalness:metal||0});
  return m;
}

function buildScene() {
  // ── ROOM GEOMETRY ──
  var roomW=12, roomH=3.5, roomD=10;

  // Floor -- hardwood
  var floorGeo = new THREE.PlaneGeometry(roomW, roomD, 20, 20);
  var floorMat = tex(0x6b4c1a, 0.9, 0.1);
  var floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Ceiling
  var ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD), tex(0xd4c4a0, 0.95));
  ceiling.rotation.x = Math.PI/2;
  ceiling.position.y = roomH;
  scene.add(ceiling);

  // Back wall -- wood paneling
  var backWall = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomH), tex(0x7a5818, 0.85, 0.05));
  backWall.position.set(0, roomH/2, -roomD/2);
  backWall.receiveShadow = true;
  scene.add(backWall);

  // Wood panel strips (vertical)
  for (var i=-5; i<=5; i++) {
    var strip = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, roomH, 0.02),
      tex(0x5c3d1a, 0.9)
    );
    strip.position.set(i*1.0, roomH/2, -roomD/2+0.02);
    scene.add(strip);
  }

  // Wainscoting rail
  var wainscot = new THREE.Mesh(new THREE.BoxGeometry(roomW, 0.08, 0.06), tex(0x8b6520, 0.6, 0.2));
  wainscot.position.set(0, 0.95, -roomD/2+0.04);
  scene.add(wainscot);

  // Side walls
  var leftWall = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), tex(0x8b7040, 0.9));
  leftWall.rotation.y = Math.PI/2;
  leftWall.position.set(-roomW/2, roomH/2, 0);
  scene.add(leftWall);

  var rightWall = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), tex(0x8b7040, 0.9));
  rightWall.rotation.y = -Math.PI/2;
  rightWall.position.set(roomW/2, roomH/2, 0);
  scene.add(rightWall);

  // ── WINDOW ──
  var winFrame = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.8, 0.12), tex(0x8b6520, 0.7, 0.1));
  winFrame.position.set(-2, 2.2, -roomD/2+0.06);
  scene.add(winFrame);

  var winGlass = new THREE.Mesh(
    new THREE.PlaneGeometry(1.8, 1.4),
    new THREE.MeshStandardMaterial({color:0xd4eeff, roughness:0, metalness:0.1, transparent:true, opacity:0.35})
  );
  winGlass.position.set(-2, 2.2, -roomD/2+0.07);
  scene.add(winGlass);

  // Blinds -- horizontal slats
  for (var b=0; b<8; b++) {
    var slat = new THREE.Mesh(
      new THREE.BoxGeometry(1.8, 0.06, 0.015),
      tex(0xc8b898, 0.8)
    );
    slat.position.set(-2, 1.6 + b*0.18, -roomD/2+0.1);
    scene.add(slat);
  }

  // Window interactable trigger
  var winTrigger = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 1.8, 0.3),
    new THREE.MeshStandardMaterial({transparent:true, opacity:0})
  );
  winTrigger.position.set(-2, 2.2, -roomD/2+0.15);
  winTrigger.userData.key = 'window';
  winTrigger.userData.label = 'Window & Venetian Blinds';
  interactables.push(winTrigger);
  scene.add(winTrigger);

  // Ambient light from window
  var winLight = new THREE.SpotLight(0xfff8e0, 0.8, 8, Math.PI/4, 0.5, 1);
  winLight.position.set(-2, 2.2, -roomD/2+1);
  winLight.target.position.set(-1, 1.6, -roomD/2+3);
  scene.add(winLight);
  scene.add(winLight.target);

  // ── DESK ──
  var deskTop = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.1, 1.4), tex(0x5c3d1a, 0.7, 0.1));
  deskTop.position.set(0.5, 0.82, -1.5);
  deskTop.castShadow = true;
  deskTop.receiveShadow = true;
  scene.add(deskTop);

  // Desk top surface (lighter felt)
  var deskSurface = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.015, 1.2), tex(0x4a3010, 0.95));
  deskSurface.position.set(0.5, 0.878, -1.5);
  scene.add(deskSurface);

  // Desk legs
  [[-1.3,-1.0],[-1.3,-2.0],[2.3,-1.0],[2.3,-2.0]].forEach(function(pos) {
    var leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.82, 0.12), tex(0x3d2810, 0.9));
    leg.position.set(pos[0], 0.41, pos[1]);
    leg.castShadow = true;
    scene.add(leg);
  });

  // Desk interactable
  var deskTrigger = new THREE.Mesh(
    new THREE.BoxGeometry(3.2, 0.5, 1.6),
    new THREE.MeshStandardMaterial({transparent:true, opacity:0})
  );
  deskTrigger.position.set(0.5, 0.82, -1.5);
  deskTrigger.userData.key = 'desk';
  deskTrigger.userData.label = 'The Desk';
  interactables.push(deskTrigger);
  scene.add(deskTrigger);

  // ── NEWSPAPER STACK ──
  for (var n=0; n<4; n++) {
    var paper = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.015, 0.28),
      tex(n===0 ? 0xf5f0e0 : 0xe8e4d0, 0.98)
    );
    paper.position.set(-0.3 + n*0.01, 0.89+n*0.018, -1.4);
    paper.rotation.y = (n%2===0?0.05:-0.03);
    scene.add(paper);
  }

  // TOO HARD pile
  for (var p=0; p<5; p++) {
    var pg = new THREE.Mesh(
      new THREE.BoxGeometry(0.28, 0.01, 0.22),
      tex(0xf0ece0, 0.98)
    );
    pg.position.set(1.2 + p*0.005, 0.89+p*0.012, -1.5);
    pg.rotation.y = (p%2===0?0.08:-0.06);
    scene.add(pg);
  }

  // Phone -- black rectangle
  var phone = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.06, 0.28), tex(0x111111, 0.7));
  phone.position.set(1.7, 0.91, -1.3);
  scene.add(phone);

  // Cherry Coke can
  var canGeo = new THREE.CylinderGeometry(0.045, 0.045, 0.18, 16);
  var can = new THREE.Mesh(canGeo, tex(0xaa0000, 0.5, 0.3));
  can.position.set(0.9, 0.975, -1.2);
  can.castShadow = true;
  can.userData.key = 'coke';
  can.userData.label = 'Cherry Coke';
  interactables.push(can);
  scene.add(can);

  // ── WARREN'S CHAIR ──
  var chairBack = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.85, 0.1), tex(0x1a1208, 0.9));
  chairBack.position.set(0.5, 1.32, -2.45);
  chairBack.castShadow = true;
  scene.add(chairBack);

  var chairSeat = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.08, 0.6), tex(0x1a1208, 0.9));
  chairSeat.position.set(0.5, 0.9, -2.2);
  scene.add(chairSeat);

  // ── WARREN FIGURE ──
  // Torso (suit jacket -- navy blue)
  var torso = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.5, 0.28), tex(0x2a3d6b, 0.85));
  torso.position.set(0.5, 1.25, -2.0);
  torso.castShadow = true;
  scene.add(torso);

  // Neck
  var neck = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.065, 0.12, 8), tex(0xc8956c, 0.85));
  neck.position.set(0.5, 1.56, -2.0);
  scene.add(neck);

  // Head
  var headGeo = new THREE.SphereGeometry(0.18, 16, 12);
  var head = new THREE.Mesh(headGeo, tex(0xc8956c, 0.85));
  head.position.set(0.5, 1.78, -2.0);
  head.scale.set(1, 1.15, 0.95);
  head.castShadow = true;
  scene.add(head);

  // Hair (grey)
  var hairGeo = new THREE.SphereGeometry(0.185, 16, 8, 0, Math.PI*2, 0, Math.PI*0.45);
  var hair = new THREE.Mesh(hairGeo, tex(0xc8c8c8, 0.9));
  hair.position.set(0.5, 1.82, -1.99);
  scene.add(hair);

  // Glasses
  var glassFrame = new THREE.Mesh(new THREE.TorusGeometry(0.055, 0.008, 6, 16), tex(0x222222, 0.7));
  glassFrame.position.set(0.38, 1.78, -1.825);
  glassFrame.rotation.y = 0.15;
  scene.add(glassFrame);
  var glassFrame2 = glassFrame.clone();
  glassFrame2.position.set(0.62, 1.78, -1.825);
  glassFrame2.rotation.y = -0.15;
  scene.add(glassFrame2);

  // Warren interactable
  var warrenTrigger = new THREE.Mesh(
    new THREE.BoxGeometry(0.6, 1.0, 0.5),
    new THREE.MeshStandardMaterial({transparent:true, opacity:0})
  );
  warrenTrigger.position.set(0.5, 1.5, -2.0);
  warrenTrigger.userData.key = 'warren';
  warrenTrigger.userData.label = 'Warren Buffett';
  interactables.push(warrenTrigger);
  scene.add(warrenTrigger);

  // Arm reading/writing
  var arm = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.085, 0.1), tex(0xc8956c, 0.85));
  arm.position.set(0.18, 0.98, -1.7);
  arm.rotation.z = -0.2;
  scene.add(arm);

  // ── PORTRAITS ──
  // Graham portrait (left wall)
  var portFrame1 = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.85, 0.06), tex(0x8b6520, 0.7, 0.15));
  portFrame1.position.set(-5.85, 2.0, -1.5);
  portFrame1.rotation.y = Math.PI/2;
  scene.add(portFrame1);

  var portCanvas1 = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.72, 0.02), tex(0xd4c4a0, 0.95));
  portCanvas1.position.set(-5.82, 2.0, -1.5);
  portCanvas1.rotation.y = Math.PI/2;
  scene.add(portCanvas1);

  // Portrait face (Graham)
  var portFace1 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 8), tex(0xb8906a, 0.9));
  portFace1.position.set(-5.8, 2.1, -1.5);
  portFace1.rotation.y = Math.PI/2;
  scene.add(portFace1);

  var portTrigger1 = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 0.9, 0.7),
    new THREE.MeshStandardMaterial({transparent:true, opacity:0})
  );
  portTrigger1.position.set(-5.8, 2.0, -1.5);
  portTrigger1.userData.key = 'graham';
  portTrigger1.userData.label = 'Benjamin Graham';
  interactables.push(portTrigger1);
  scene.add(portTrigger1);

  // Munger portrait (right wall)
  var portFrame2 = portFrame1.clone();
  portFrame2.position.set(5.85, 2.0, -1.5);
  portFrame2.rotation.y = -Math.PI/2;
  scene.add(portFrame2);

  var portCanvas2 = portCanvas1.clone();
  portCanvas2.position.set(5.82, 2.0, -1.5);
  portCanvas2.rotation.y = -Math.PI/2;
  scene.add(portCanvas2);

  var portFace2 = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 8), tex(0xa07860, 0.9));
  portFace2.position.set(5.8, 2.1, -1.5);
  portFace2.rotation.y = -Math.PI/2;
  scene.add(portFace2);

  var portTrigger2 = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 0.9, 0.7),
    new THREE.MeshStandardMaterial({transparent:true, opacity:0})
  );
  portTrigger2.position.set(5.8, 2.0, -1.5);
  portTrigger2.userData.key = 'munger';
  portTrigger2.userData.label = 'Charlie Munger';
  interactables.push(portTrigger2);
  scene.add(portTrigger2);

  // ── BOOKSHELF ──
  var shelf = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 0.4), tex(0x5c3d1a, 0.85));
  shelf.position.set(4.5, 1.1, -roomD/2+0.25);
  shelf.castShadow = true;
  scene.add(shelf);
  // Books
  var bookColors = [0x8b0000,0x1a3a6b,0x2a5a2a,0x5c3d1a,0x8b6520,0x333333,0x6b1a1a,0x1a4a6b];
  for (var bk=0; bk<16; bk++) {
    var book = new THREE.Mesh(
      new THREE.BoxGeometry(0.08 + Math.random()*0.04, 0.26 + Math.random()*0.12, 0.22),
      tex(bookColors[bk%bookColors.length], 0.9)
    );
    book.position.set(3.6 + (bk%8)*0.24, 0.45 + Math.floor(bk/8)*0.5, -roomD/2+0.22);
    book.rotation.y = (Math.random()-0.5)*0.05;
    scene.add(book);
  }

  // ── FLOOR LAMP ──
  var lampPole = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.03, 1.6, 8), tex(0x8b6520, 0.6, 0.4));
  lampPole.position.set(-4.5, 0.8, -2.5);
  scene.add(lampPole);
  var lampShade = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.3, 16, 1, true), tex(0xd4a060, 0.8));
  lampShade.position.set(-4.5, 1.75, -2.5);
  lampShade.rotation.x = Math.PI;
  scene.add(lampShade);

  // ── AREA RUG ──
  var rug = new THREE.Mesh(new THREE.BoxGeometry(5, 0.015, 3.5), tex(0x8b2020, 0.95));
  rug.position.set(0.5, 0.008, -1.5);
  scene.add(rug);

  // Rug border
  var rugBorder = new THREE.Mesh(new THREE.BoxGeometry(5.2, 0.012, 3.7), tex(0xc8a030, 0.95));
  rugBorder.position.set(0.5, 0.006, -1.5);
  scene.add(rugBorder);
}

function setupLights() {
  // Ambient
  var ambient = new THREE.AmbientLight(0xfff4e0, 0.4);
  scene.add(ambient);

  // Main overhead -- warm incandescent
  var overhead = new THREE.PointLight(0xfff0d0, 1.2, 12, 2);
  overhead.position.set(0.5, 3.2, -1.5);
  overhead.castShadow = true;
  overhead.shadow.mapSize.width = 1024;
  overhead.shadow.mapSize.height = 1024;
  scene.add(overhead);

  // Desk lamp glow
  var deskGlow = new THREE.PointLight(0xffe8a0, 0.8, 3, 2);
  deskGlow.position.set(-4.5, 1.8, -2.5);
  scene.add(deskGlow);

  // Subtle back fill
  var fill = new THREE.DirectionalLight(0xfff0e0, 0.2);
  fill.position.set(-3, 4, 2);
  scene.add(fill);
}

function setupControls() {
  // Pointer lock
  var canvas = renderer.domElement;
  canvas.addEventListener('click', function() {
    if (!document.getElementById('trivium').classList.contains('show')) {
      canvas.requestPointerLock();
    }
  });

  document.addEventListener('pointerlockchange', function() {
    isLocked = (document.pointerLockElement === canvas);
    document.getElementById('crosshair').style.display = isLocked ? 'block' : 'none';
    document.getElementById('esc-hint').style.display = isLocked ? 'block' : 'none';
    document.getElementById('caption').style.opacity = isLocked ? '0' : '1';
  });

  document.addEventListener('mousemove', function(e) {
    if (!isLocked) return;
    var sens = 0.002;
    yaw -= e.movementX * sens;
    pitch -= e.movementY * sens;
    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/4, pitch));
  });

  // Click to interact
  canvas.addEventListener('click', function() {
    if (!isLocked) return;
    if (hovered) {
      showTrivium(hovered.userData.key);
      document.exitPointerLock();
    }
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key==='w'||e.key==='ArrowUp')    moveF=true;
    if (e.key==='s'||e.key==='ArrowDown')  moveB=true;
    if (e.key==='a'||e.key==='ArrowLeft')  moveL=true;
    if (e.key==='d'||e.key==='ArrowRight') moveR=true;
    if (e.key==='f'||e.key==='F') { if(hovered){ showTrivium(hovered.userData.key); if(isLocked) document.exitPointerLock(); }}
    if (e.key==='Escape') { closeTrivium(); if(!isLocked) goBack(); }
  });
  document.addEventListener('keyup', function(e) {
    if (e.key==='w'||e.key==='ArrowUp')    moveF=false;
    if (e.key==='s'||e.key==='ArrowDown')  moveB=false;
    if (e.key==='a'||e.key==='ArrowLeft')  moveL=false;
    if (e.key==='d'||e.key==='ArrowRight') moveR=false;
  });

  // Touch / mobile swipe
  var touchX=0, touchY=0;
  document.addEventListener('touchstart', function(e){ touchX=e.touches[0].clientX; touchY=e.touches[0].clientY; });
  document.addEventListener('touchmove', function(e){
    var dx=e.touches[0].clientX-touchX, dy=e.touches[0].clientY-touchY;
    yaw -= dx*0.003; pitch -= dy*0.003;
    pitch=Math.max(-Math.PI/3,Math.min(Math.PI/4,pitch));
    touchX=e.touches[0].clientX; touchY=e.touches[0].clientY;
  });
}

function animate() {
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.05);

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // Movement
  var speed = (moveF&&moveB) ? 0 : WALK_SPEED;
  var dir = new THREE.Vector3();
  if (moveF) dir.z -= 1;
  if (moveB) dir.z += 1;
  if (moveL) dir.x -= 1;
  if (moveR) dir.x += 1;
  dir.normalize().multiplyScalar(speed * dt);
  dir.applyEuler(new THREE.Euler(0, yaw, 0));

  var nx = camera.position.x + dir.x;
  var nz = camera.position.z + dir.z;
  // Room bounds
  if (nx > -5.5 && nx < 5.5) camera.position.x = nx;
  if (nz > -4.5 && nz < 6.5) camera.position.z = nz;

  // Raycasting for interaction
  if (isLocked) {
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    var hits = raycaster.intersectObjects(interactables);
    var hint = document.getElementById('interact-hint');
    if (hits.length > 0 && hits[0].distance < 4.5) {
      hovered = hits[0].object;
      hint.textContent = 'Click to examine: ' + hovered.userData.label;
      hint.style.display = 'block';
    } else {
      hovered = null;
      hint.style.display = 'none';
    }
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ── LOADING SEQUENCE ──
var loadProgress = 0;
var loadInterval = setInterval(function() {
  loadProgress += Math.random() * 18;
  if (loadProgress >= 100) {
    loadProgress = 100;
    clearInterval(loadInterval);
    document.getElementById('load-bar').style.width = '100%';
    setTimeout(function() {
      init();
      document.getElementById('loading').classList.add('fade');
      document.getElementById('location').style.display = 'block';
    }, 400);
  }
  document.getElementById('load-bar').style.width = loadProgress + '%';
}, 120);
</script>
