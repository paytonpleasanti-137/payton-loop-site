<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payton Loop</title>
<style>
body{margin:0;padding:0;background:#fff;font-family:Arial,sans-serif;font-size:14px;color:#000}
.outer{max-width:780px;margin:0 auto;padding:20px 12px 40px}
.hdr{text-align:center;border-bottom:2px solid #000;padding-bottom:14px;margin-bottom:16px}
.hdr h1{font-size:26px;font-weight:bold;letter-spacing:1px;margin:0 0 4px;text-transform:uppercase}
.hdr p{font-size:13px;line-height:1.8;margin:0}
.tkr{background:#000;color:#fff;overflow:hidden;white-space:nowrap;padding:5px 0;font-size:11px;margin-bottom:16px}
.tki{display:inline-block;animation:tmv 38s linear infinite}
@keyframes tmv{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
.tkl{background:#cc0000;color:#fff;padding:1px 8px;font-weight:bold;margin-right:10px}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;margin-bottom:20px}
.col ul{list-style:none;margin:0;padding:0}
.col li{margin-bottom:16px}
.col a{color:#00008b;text-decoration:underline;font-size:14px;display:block;line-height:1.3;cursor:pointer}
.col a:hover{color:#cc0000}
.upd{font-size:11px;color:#555;margin-top:2px}
.fad{text-align:center;border-top:1px solid #000;border-bottom:1px solid #000;padding:10px 0;margin:16px 0;font-size:12px;color:#333}
.fad strong{display:block;font-size:13px;font-weight:bold;letter-spacing:1px;margin-bottom:2px}
.dis{font-size:12px;color:#333;line-height:1.7;margin-bottom:12px}
.cprt{font-size:12px;font-weight:bold}
.pg{display:none}
.pg.on{display:block}
.ph{border-bottom:2px solid #000;margin-bottom:18px;padding-bottom:8px}
.ph h2{font-size:18px;margin:0 0 4px;text-transform:uppercase;letter-spacing:1px}
.bk{font-size:12px;color:#00008b;text-decoration:underline;cursor:pointer;display:block;margin-bottom:6px}
.bk:hover{color:#cc0000}
table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
th{text-align:left;border-bottom:2px solid #000;padding:6px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{border-bottom:1px solid #ddd;padding:6px 4px;vertical-align:top}
tr:last-child td{border-bottom:none}
.n{text-align:right;font-family:monospace}
.r{color:#cc0000}.g{color:#006600}
.sl{font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px;border-bottom:1px solid #ccc;padding-bottom:4px}
input[type=number],select{border:1px solid #999;padding:3px 6px;font-family:Arial;font-size:13px}
.cr{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.cr label{min-width:200px}
.ao{background:#000;color:#0f0;font-family:monospace;font-size:12px;padding:12px;margin-top:8px;line-height:1.8;min-height:60px;white-space:pre-wrap}
.cl{display:block;color:#00008b;text-decoration:underline;font-size:13px;margin-bottom:10px}
.cl:hover{color:#cc0000}
button{background:#000;color:#fff;border:none;padding:6px 18px;font-family:Arial;font-size:13px;cursor:pointer;margin-top:4px}
</style>
</head>
<body>
