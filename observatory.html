<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Payton Loop Observatory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000008;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Starfield */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: var(--opacity);
  }

  @keyframes twinkle {
    from { opacity: var(--opacity); transform: scale(1); }
    to   { opacity: calc(var(--opacity) * 0.2); transform: scale(0.6); }
  }

  /* Solar system container */
  #solar-system {
    position: relative;
    width: 700px;
    height: 700px;
    z-index: 2;
  }

  /* Sun */
  .sun {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff8a0, #FFD700, #FF8C00, #FF4500);
    box-shadow:
      0 0 30px 10px #FFD70088,
      0 0 60px 20px #FF8C0055,
      0 0 100px 30px #FF450033;
    z-index: 10;
    cursor: default;
    animation: sunPulse 3s ease-in-out infinite alternate;
  }

  .sun-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, calc(-50% + 60px));
    color: #FFD700;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    white-space: nowrap;
    text-shadow: 0 0 10px #FFD700;
    letter-spacing: 1px;
    z-index: 11;
  }

  @keyframes sunPulse {
    from { box-shadow: 0 0 30px 10px #FFD70088, 0 0 60px 20px #FF8C0055, 0 0 100px 30px #FF450033; }
    to   { box-shadow: 0 0 40px 15px #FFD700aa, 0 0 80px 30px #FF8C0077, 0 0 130px 40px #FF450055; }
  }

  /* Orbit rings */
  .orbit {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.07);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* Planet wrappers (animate the orbit) */
  .planet-orbit {
    position: absolute;
    top: 50%; left: 50%;
    transform-origin: 0 0;
    animation: orbit linear infinite;
  }

  @keyframes orbit {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* The planet dot itself (counter-rotate so it stays upright) */
  .planet {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: counterRotate linear infinite;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .planet:hover {
    transform: scale(1.4) !important;
  }

  @keyframes counterRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
  }

  /* Planet label (always readable) */
  .planet-label {
    position: absolute;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    text-shadow: 0 0 6px rgba(0,0,0,0.9), 0 0 12px rgba(0,0,0,0.9);
    pointer-events: none;
    top: 110%;
    left: 50%;
    transform: translateX(-50%);
    letter-spacing: 0.5px;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: rgba(5, 10, 25, 0.95);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    color: #fff;
    font-size: 13px;
    line-height: 1.6;
    max-width: 240px;
    z-index: 100;
    pointer-events: none;
    display: none;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .tooltip.visible { display: block; }

  .tooltip-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--planet-color);
    text-shadow: 0 0 8px var(--planet-color);
  }

  .tooltip-stat {
    color: #aaa;
    font-size: 12px;
  }

  .tooltip-stat span {
    color: #fff;
    font-weight: 600;
  }

  /* Bottom tagline */
  .tagline {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 5;
    animation: fadeIn 2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* Title */
  .observatory-title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 5;
    text-shadow: 0 0 20px rgba(255,200,50,0.4);
  }
</style>
</head>
<body>

<div id="starfield"></div>

<div class="observatory-title">🔭 The Payton Loop Observatory</div>

<div id="solar-system">
  <!-- Orbit rings -->
  <div class="orbit" style="width:170px;height:170px;margin-left:-85px;margin-top:-85px;"></div>
  <div class="orbit" style="width:260px;height:260px;margin-left:-130px;margin-top:-130px;"></div>
  <div class="orbit" style="width:360px;height:360px;margin-left:-180px;margin-top:-180px;"></div>
  <div class="orbit" style="width:470px;height:470px;margin-left:-235px;margin-top:-235px;"></div>
  <div class="orbit" style="width:590px;height:590px;margin-left:-295px;margin-top:-295px;"></div>

  <!-- Sun -->
  <div class="sun"></div>
  <div class="sun-label">PAYTON LOOP HQ</div>

  <!-- Planets injected by JS -->
</div>

<div class="tagline">Every video posted makes the planets grow</div>

<div class="tooltip" id="tooltip"></div>

<script>
  // ---- Starfield ----
  const sf = document.getElementById('starfield');
  for (let i = 0; i < 220; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    const opacity = Math.random() * 0.7 + 0.15;
    const dur = (Math.random() * 3 + 2).toFixed(1) + 's';
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --opacity:${opacity};
      --dur:${dur};
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    sf.appendChild(s);
  }

  // ---- Planet data ----
  const planets = [
    {
      name: 'YouTube AdSense',
      color: '#4A90E2',
      size: 22,
      orbitR: 85,
      speed: 9,   // seconds per orbit
      startAngle: 30,
      stats: { Views: '69 so far', Status: 'Active', Revenue: 'Building...' },
      emoji: '🎬'
    },
    {
      name: 'Amazon Associates',
      color: '#FF9500',
      size: 20,
      orbitR: 130,
      speed: 15,
      startAngle: 140,
      stats: { Code: 'paytonloop29-20', Status: 'Active ✓', Earnings: 'Pending' },
      emoji: '📦'
    },
    {
      name: 'Blog',
      color: '#4CAF50',
      size: 28,
      orbitR: 180,
      speed: 22,
      startAngle: 220,
      stats: { Schedule: 'Auto-publish 3am', Posts: 'Rolling out', SEO: 'Indexed' },
      emoji: '✍️'
    },
    {
      name: 'Tim Janis Livestream',
      color: '#AB47BC',
      size: 18,
      orbitR: 235,
      speed: 33,
      startAngle: 80,
      stats: { Status: 'Coming Soon', Type: 'Livestream', Potential: 'High' },
      emoji: '🎵'
    },
    {
      name: 'Digital Products',
      color: '#EF5350',
      size: 16,
      orbitR: 295,
      speed: 48,
      startAngle: 310,
      stats: { Status: 'Future', Type: 'Courses / Downloads', Stage: 'Planned' },
      emoji: '🚀'
    }
  ];

  const system = document.getElementById('solar-system');
  const tooltip = document.getElementById('tooltip');

  planets.forEach(p => {
    // Orbit wrapper (rotates)
    const orbitDiv = document.createElement('div');
    orbitDiv.className = 'planet-orbit';
    orbitDiv.style.cssText = `
      animation-duration: ${p.speed}s;
      animation-delay: -${(p.startAngle / 360 * p.speed).toFixed(2)}s;
      width: 0; height: 0;
    `;

    // Planet
    const planetDiv = document.createElement('div');
    planetDiv.className = 'planet';
    planetDiv.style.cssText = `
      width: ${p.size}px;
      height: ${p.size}px;
      background: radial-gradient(circle at 35% 30%, ${lighten(p.color)}, ${p.color}, ${darken(p.color)});
      box-shadow: 0 0 ${p.size}px ${p.size/2}px ${p.color}55, 0 0 ${p.size*2}px ${p.size}px ${p.color}22;
      left: ${p.orbitR - p.size/2}px;
      top: ${-p.size/2}px;
      animation-duration: ${p.speed}s;
    `;

    const label = document.createElement('div');
    label.className = 'planet-label';
    label.textContent = p.emoji + ' ' + p.name;
    planetDiv.appendChild(label);

    // Tooltip interaction
    planetDiv.addEventListener('mouseenter', (e) => {
      tooltip.innerHTML = `
        <div class="tooltip-title" style="--planet-color:${p.color}">${p.emoji} ${p.name}</div>
        ${Object.entries(p.stats).map(([k,v]) => `
          <div class="tooltip-stat">${k}: <span>${v}</span></div>
        `).join('')}
      `;
      tooltip.classList.add('visible');
    });

    planetDiv.addEventListener('mousemove', (e) => {
      const x = e.clientX + 16;
      const y = e.clientY - 10;
      tooltip.style.left = Math.min(x, window.innerWidth - 260) + 'px';
      tooltip.style.top = Math.min(y, window.innerHeight - 140) + 'px';
    });

    planetDiv.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });

    orbitDiv.appendChild(planetDiv);
    system.appendChild(orbitDiv);
  });

  function lighten(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
  }
  function darken(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;
  }
</script>
</body>
</html>
