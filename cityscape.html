<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Financial Cityscape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
#c{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
#hud-left{display:flex;flex-direction:column;gap:4px}
#hud-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.9)}
#hud-sub{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase}
#hud-right{text-align:right}
#hud-node{font-size:13px;font-weight:700;letter-spacing:1px;color:#fff;margin-bottom:3px;min-height:18px}
#hud-detail{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.4);min-height:13px}
#hud-controls{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);pointer-events:none;z-index:10;text-align:center}
#scan-line{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(180,180,160,0.12),transparent);animation:scan 9s linear infinite;pointer-events:none;z-index:5}
@keyframes scan{from{top:0}to{top:100vh}}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;opacity:0.12}
#loader-bar{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);width:220px;height:1px;background:rgba(255,255,255,0.06);z-index:20}
#loader-fill{height:100%;width:0%;background:rgba(200,185,120,0.7)}
#loader-label{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);z-index:20;white-space:nowrap;text-align:center}
#flow-legend{position:fixed;bottom:56px;right:20px;font-family:'Courier New',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);z-index:10;line-height:2;text-align:right;pointer-events:none}
#stats-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.22);z-index:10;padding:10px 0;pointer-events:none}

/* ── SHADER PANEL ─────────────────────────────── */
#shader-panel{
  position:fixed;top:50%;left:20px;transform:translateY(-50%);
  width:220px;z-index:30;pointer-events:all;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(4,4,3,0.92);
  font-family:'Courier New',monospace;
}
#shader-panel-title{
  padding:10px 14px 8px;
  font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;justify-content:space-between;align-items:center;cursor:pointer;
}
#shader-panel-title span{color:rgba(255,255,255,0.18);font-size:10px}
.sh-mode-btn{
  display:block;width:100%;padding:9px 14px;
  font-family:'Courier New',monospace;font-size:9px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;text-align:left;
  border:none;border-bottom:1px solid rgba(255,255,255,0.05);
  background:transparent;color:rgba(255,255,255,0.28);cursor:pointer;
  transition:background 0.1s,color 0.1s;
}
.sh-mode-btn:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.55)}
.sh-mode-btn.active{color:#fff;background:rgba(255,255,255,0.06)}
.sh-mode-btn.active .sh-dot{background:currentColor}
.sh-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2);margin-right:9px;vertical-align:middle;transition:background 0.1s}
#shader-sliders{padding:12px 14px;border-top:1px solid rgba(255,255,255,0.06)}
.sh-slider-row{margin-bottom:10px}
.sh-slider-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);display:flex;justify-content:space-between;margin-bottom:5px}
.sh-slider-label span{color:rgba(255,255,255,0.5);font-variant-numeric:tabular-nums}
input[type=range].sh-range{
  width:100%;height:2px;-webkit-appearance:none;appearance:none;
  background:rgba(255,255,255,0.12);outline:none;cursor:pointer;
}
input[type=range].sh-range::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;
  background:#fff;border-radius:0;cursor:pointer;
}
#shader-mode-indicator{
  position:fixed;bottom:20px;right:20px;
  font-family:'Courier New',monospace;font-size:8px;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,255,255,0.25);z-index:10;
  pointer-events:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scan-line"></div>
<div id="hud">
  <div id="hud-left">
    <div id="hud-title">&#9670; Financial Grid</div>
    <div id="hud-sub">Market Infrastructure &bull; Live Architecture</div>
  </div>
  <div id="hud-right">
    <div id="hud-node"></div>
    <div id="hud-detail"></div>
  </div>
</div>
<div id="stats-bar" id="stats-bar">Initializing&hellip;</div>
<div id="hud-controls">Drag &mdash; Orbit &nbsp;&bull;&nbsp; Scroll &mdash; Zoom &nbsp;&bull;&nbsp; Right-drag &mdash; Pan</div>
<div id="loader-bar"><div id="loader-fill"></div></div>
<div id="loader-label">Allocating particle streams&hellip;</div>
<div id="flow-legend">
  <span style="color:rgba(255,210,90,0.6)">&#9632;</span> Capital Flow<br>
  <span style="color:rgba(100,195,255,0.6)">&#9632;</span> Liquidity<br>
  <span style="color:rgba(255,110,80,0.6)">&#9632;</span> Settlement<br>
  <span style="color:rgba(90,255,150,0.6)">&#9632;</span> Crypto
</div>
<svg id="crosshair" width="22" height="22" viewBox="0 0 22 22">
  <line x1="11" y1="0" x2="11" y2="7" stroke="white" stroke-width="0.8"/>
  <line x1="11" y1="15" x2="11" y2="22" stroke="white" stroke-width="0.8"/>
  <line x1="0" y1="11" x2="7" y2="11" stroke="white" stroke-width="0.8"/>
  <line x1="15" y1="11" x2="22" y2="11" stroke="white" stroke-width="0.8"/>
</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════
// 0. SCENE BOOTSTRAP
// ════════════════════════════════════════════════════
var W = window.innerWidth, H = window.innerHeight;
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x020202, 0.016);

var camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 800);
camera.position.set(0, 28, 42);
camera.lookAt(0, 0, 0);

var renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;

// ════════════════════════════════════════════════════
// 1. LIGHTS
// ════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x080c10, 0.6));
var keyLight = new THREE.DirectionalLight(0x9ab0c0, 1.2);
keyLight.position.set(20, 60, 20);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.left = -80; keyLight.shadow.camera.right = 80;
keyLight.shadow.camera.top = 80;   keyLight.shadow.camera.bottom = -80;
keyLight.shadow.camera.far = 200;
scene.add(keyLight);
scene.add(new THREE.DirectionalLight(0xc08050, 0.4)).position.set(-30,10,-20);
scene.add(new THREE.HemisphereLight(0x101820, 0x060608, 0.5));

// ════════════════════════════════════════════════════
// 2. GROUND + GRID
// ════════════════════════════════════════════════════
var groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({color:0x0a0a08, roughness:0.95, metalness:0.1})
);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);
var grid = new THREE.GridHelper(200, 80, 0x181812, 0x0e0e0a);
grid.position.y = 0.01;
scene.add(grid);

// ════════════════════════════════════════════════════
// 3. NODE DATA
// ════════════════════════════════════════════════════
var NODES = [
  {id:'NYSE',    label:'NYSE',            type:'cube',     cap:25400, sector:'Exchange',   x:0,   z:0},
  {id:'NASDAQ',  label:'NASDAQ',          type:'cube',     cap:22100, sector:'Exchange',   x:8,   z:2},
  {id:'CME',     label:'CME Group',       type:'cube',     cap:7800,  sector:'Exchange',   x:-8,  z:1},
  {id:'CBOE',    label:'CBOE',            type:'cube',     cap:4200,  sector:'Exchange',   x:4,   z:-6},
  {id:'ICE',     label:'ICE',             type:'cube',     cap:6900,  sector:'Exchange',   x:-4,  z:5},
  {id:'LSE',     label:'London Stock Ex', type:'cube',     cap:5800,  sector:'Exchange',   x:14,  z:-3},
  {id:'TSE',     label:'Tokyo Stock Ex',  type:'cube',     cap:9200,  sector:'Exchange',   x:-14, z:-4},
  {id:'HKEX',    label:'Hong Kong Ex',    type:'cube',     cap:6100,  sector:'Exchange',   x:12,  z:8},
  {id:'BINANCE', label:'Binance',         type:'cylinder', cap:3200,  sector:'Crypto',     x:6,   z:10},
  {id:'COINBASE',label:'Coinbase',        type:'cylinder', cap:1800,  sector:'Crypto',     x:-6,  z:10},
  {id:'KRAKEN',  label:'Kraken',          type:'cylinder', cap:900,   sector:'Crypto',     x:0,   z:14},
  {id:'FED',     label:'Federal Reserve', type:'cube',     cap:99000, sector:'CentralBank',x:-2,  z:-10},
  {id:'ECB',     label:'ECB',             type:'cube',     cap:72000, sector:'CentralBank',x:10,  z:-10},
  {id:'BOJ',     label:'Bank of Japan',   type:'cube',     cap:68000, sector:'CentralBank',x:-12, z:-10},
  {id:'BOE',     label:'Bank of England', type:'cube',     cap:48000, sector:'CentralBank',x:18,  z:-10},
  {id:'PBOC',    label:'PBOC',            type:'cube',     cap:61000, sector:'CentralBank',x:-18, z:-8},
  {id:'JPM',     label:'JPMorgan',        type:'cube',     cap:5800,  sector:'Bank',       x:18,  z:4},
  {id:'BAC',     label:'Bank of America', type:'cube',     cap:3200,  sector:'Bank',       x:18,  z:10},
  {id:'GS',      label:'Goldman Sachs',   type:'cube',     cap:1800,  sector:'Bank',       x:22,  z:0},
  {id:'MS',      label:'Morgan Stanley',  type:'cube',     cap:1600,  sector:'Bank',       x:22,  z:6},
  {id:'WFC',     label:'Wells Fargo',     type:'cube',     cap:1900,  sector:'Bank',       x:22,  z:12},
  {id:'C',       label:'Citigroup',       type:'cube',     cap:1200,  sector:'Bank',       x:26,  z:4},
  {id:'HSBC',    label:'HSBC',            type:'cube',     cap:1700,  sector:'Bank',       x:26,  z:10},
  {id:'BCS',     label:'Barclays',        type:'cube',     cap:800,   sector:'Bank',       x:26,  z:16},
  {id:'BLK',     label:'BlackRock',       type:'cylinder', cap:12000, sector:'AssetMgr',   x:-18, z:4},
  {id:'VANG',    label:'Vanguard',        type:'cylinder', cap:8000,  sector:'AssetMgr',   x:-18, z:10},
  {id:'FIDO',    label:'Fidelity',        type:'cylinder', cap:5500,  sector:'AssetMgr',   x:-22, z:2},
  {id:'SSGA',    label:'State Street',    type:'cylinder', cap:4200,  sector:'AssetMgr',   x:-22, z:8},
  {id:'BRK',     label:'Berkshire',       type:'cylinder', cap:9800,  sector:'AssetMgr',   x:-18, z:16},
  {id:'APO',     label:'Apollo',          type:'cylinder', cap:3100,  sector:'AssetMgr',   x:-22, z:14},
  {id:'DTC',     label:'DTCC',            type:'cube',     cap:18000, sector:'Infra',      x:-8,  z:-16},
  {id:'SWIFT',   label:'SWIFT',           type:'cube',     cap:14000, sector:'Infra',      x:0,   z:-18},
  {id:'FIS',     label:'FIS',             type:'cylinder', cap:4100,  sector:'Infra',      x:8,   z:-16},
  {id:'VISA',    label:'Visa',            type:'cylinder', cap:5600,  sector:'Infra',      x:16,  z:-16},
  {id:'MC',      label:'Mastercard',      type:'cylinder', cap:4700,  sector:'Infra',      x:22,  z:-14},
];

var SECTOR_COLORS = {
  Exchange:    {base:0x3a1a1a, emissive:0x1a0000},
  CentralBank: {base:0x1a1a3a, emissive:0x00001a},
  Bank:        {base:0x0a1a2a, emissive:0x00101a},
  AssetMgr:    {base:0x2a2010, emissive:0x1a1000},
  Crypto:      {base:0x0a2a1a, emissive:0x001a0a},
  Infra:       {base:0x1a0a2a, emissive:0x100010},
};

var CAP_MIN = 800, CAP_MAX = 99000;
function capToHeight(cap) {
  var t = Math.pow((cap - CAP_MIN) / (CAP_MAX - CAP_MIN), 0.45);
  return 0.8 + t * 22;
}
function capToWidth(cap) {
  var t = Math.pow((cap - CAP_MIN) / (CAP_MAX - CAP_MIN), 0.3);
  return 0.6 + t * 1.8;
}

// ════════════════════════════════════════════════════
// 4. BUILD MONOLITHS + NODE POSITION MAP
// ════════════════════════════════════════════════════
var meshes = [];
var NODE_POS = {};

NODES.forEach(function(node) {
  var h = capToHeight(node.cap);
  var w = capToWidth(node.cap);
  var sc = SECTOR_COLORS[node.sector] || SECTOR_COLORS.Bank;

  var geo = node.type === 'cylinder'
    ? new THREE.CylinderGeometry(w*0.45, w*0.5, h, 12, 1)
    : new THREE.BoxGeometry(w, h, w);

  var mat = new THREE.MeshStandardMaterial({
    color: sc.base, emissive: sc.emissive,
    roughness: 0.35, metalness: 0.85
  });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(node.x*2.2, h/2, node.z*2.2);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = node;
  mesh._baseEmissive = new THREE.Color(sc.emissive);
  scene.add(mesh);
  meshes.push(mesh);

  // Top cap
  var capH = Math.max(0.06, h*0.025);
  var capGeo = node.type === 'cylinder'
    ? new THREE.CylinderGeometry(w*0.46, w*0.46, capH, 12)
    : new THREE.BoxGeometry(w*1.02, capH, w*1.02);
  var capMesh = new THREE.Mesh(capGeo, new THREE.MeshStandardMaterial({
    color:0x303028, emissive:sc.emissive, emissiveIntensity:3.0, roughness:0.2, metalness:0.95
  }));
  capMesh.position.set(node.x*2.2, h+capH/2, node.z*2.2);
  scene.add(capMesh);

  if (node.type === 'cube') {
    var edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({color:0x1e1e16, transparent:true, opacity:0.35})
    );
    edges.position.copy(mesh.position);
    scene.add(edges);
  }

  // Store top-center world position for arc origins
  NODE_POS[node.id] = new THREE.Vector3(node.x*2.2, h, node.z*2.2);
});

// Sector centroid connection lines
var sectorGroups = {};
NODES.forEach(function(n){ (sectorGroups[n.sector] = sectorGroups[n.sector]||[]).push(n); });
var lineMat = new THREE.LineBasicMaterial({color:0x1a1a12, transparent:true, opacity:0.2});
Object.keys(sectorGroups).forEach(function(sec) {
  var grp = sectorGroups[sec];
  if (grp.length < 2) return;
  var cx = grp.reduce(function(s,n){return s+n.x;},0)/grp.length;
  var cz = grp.reduce(function(s,n){return s+n.z;},0)/grp.length;
  grp.forEach(function(n) {
    var pts = [new THREE.Vector3(cx*2.2,1,cz*2.2), new THREE.Vector3(n.x*2.2,1,n.z*2.2)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
  });
});

// ════════════════════════════════════════════════════
// 5. FLOW CHANNELS
// ════════════════════════════════════════════════════
var FLOW_CHANNELS = [
  {a:'FED',    b:'NYSE',     vol:0.95, liq:0.90, type:'settlement'},
  {a:'FED',    b:'NASDAQ',   vol:0.88, liq:0.85, type:'settlement'},
  {a:'FED',    b:'SWIFT',    vol:0.98, liq:0.95, type:'settlement'},
  {a:'ECB',    b:'LSE',      vol:0.82, liq:0.80, type:'settlement'},
  {a:'BOJ',    b:'TSE',      vol:0.79, liq:0.75, type:'settlement'},
  {a:'PBOC',   b:'HKEX',    vol:0.75, liq:0.72, type:'settlement'},
  {a:'NYSE',   b:'DTC',      vol:0.92, liq:0.88, type:'capital'},
  {a:'NASDAQ', b:'DTC',      vol:0.89, liq:0.86, type:'capital'},
  {a:'CME',    b:'DTC',      vol:0.78, liq:0.75, type:'capital'},
  {a:'CBOE',   b:'DTC',      vol:0.65, liq:0.62, type:'capital'},
  {a:'LSE',    b:'SWIFT',    vol:0.71, liq:0.68, type:'capital'},
  {a:'HKEX',   b:'SWIFT',   vol:0.68, liq:0.65, type:'capital'},
  {a:'JPM',    b:'NYSE',     vol:0.85, liq:0.82, type:'capital'},
  {a:'GS',     b:'NYSE',     vol:0.80, liq:0.76, type:'capital'},
  {a:'MS',     b:'NASDAQ',   vol:0.75, liq:0.72, type:'capital'},
  {a:'BAC',    b:'NYSE',     vol:0.72, liq:0.70, type:'capital'},
  {a:'JPM',    b:'SWIFT',    vol:0.78, liq:0.80, type:'capital'},
  {a:'HSBC',   b:'LSE',      vol:0.70, liq:0.68, type:'capital'},
  {a:'C',      b:'NYSE',     vol:0.68, liq:0.65, type:'capital'},
  {a:'BLK',    b:'NYSE',     vol:0.88, liq:0.85, type:'liquidity'},
  {a:'VANG',   b:'NASDAQ',   vol:0.85, liq:0.82, type:'liquidity'},
  {a:'FIDO',   b:'NYSE',     vol:0.80, liq:0.78, type:'liquidity'},
  {a:'BRK',    b:'NYSE',     vol:0.75, liq:0.72, type:'liquidity'},
  {a:'SSGA',   b:'NYSE',     vol:0.72, liq:0.70, type:'liquidity'},
  {a:'APO',    b:'NYSE',     vol:0.55, liq:0.52, type:'liquidity'},
  {a:'BINANCE',b:'COINBASE', vol:0.82, liq:0.78, type:'crypto'},
  {a:'KRAKEN', b:'COINBASE', vol:0.60, liq:0.58, type:'crypto'},
  {a:'BINANCE',b:'NASDAQ',   vol:0.45, liq:0.42, type:'crypto'},
  {a:'VISA',   b:'NYSE',     vol:0.88, liq:0.85, type:'capital'},
  {a:'MC',     b:'NYSE',     vol:0.85, liq:0.82, type:'capital'},
  {a:'FIS',    b:'DTC',      vol:0.72, liq:0.70, type:'capital'},
  {a:'VISA',   b:'JPM',      vol:0.80, liq:0.78, type:'capital'},
  {a:'MC',     b:'BAC',      vol:0.75, liq:0.72, type:'capital'},
  {a:'NYSE',   b:'LSE',      vol:0.60, liq:0.58, type:'capital'},
  {a:'NASDAQ', b:'TSE',      vol:0.55, liq:0.52, type:'capital'},
];

var FLOW_COLORS = {
  capital:    new THREE.Color(0.90, 0.80, 0.28),
  liquidity:  new THREE.Color(0.28, 0.74, 1.00),
  settlement: new THREE.Color(1.00, 0.40, 0.26),
  crypto:     new THREE.Color(0.40, 1.00, 0.52),
};
var FLOW_SPEEDS = {capital:1.4, liquidity:1.9, settlement:2.4, crypto:3.0};

// ════════════════════════════════════════════════════
// 6. PRECOMPUTE CHANNEL BEZIER DATA
// ════════════════════════════════════════════════════
var channelCount = FLOW_CHANNELS.length;
var chCtrl = [];   // [p0,ctrl,p1] for each channel
var chSpd  = [];   // base speed
var chWgt  = [];   // cumulative normalized weight

(function() {
  var total = 0;
  for (var i = 0; i < channelCount; i++) {
    var ch = FLOW_CHANNELS[i];
    var a = NODE_POS[ch.a], b = NODE_POS[ch.b];
    if (!a || !b) { chCtrl.push(null); chSpd.push(0); chWgt.push(0); continue; }
    var mid = new THREE.Vector3((a.x+b.x)/2, (a.y+b.y)/2, (a.z+b.z)/2);
    mid.y += a.distanceTo(b) * (0.38 + ch.vol * 0.48);
    chCtrl.push([a.clone(), mid, b.clone()]);
    chSpd.push(FLOW_SPEEDS[ch.type] * (0.55 + ch.vol * 0.85));
    var w = ch.vol * ch.liq;
    chWgt.push(w);
    total += w;
  }
  var cum = 0;
  for (var i = 0; i < channelCount; i++) {
    chWgt[i] = (chWgt[i] / total) + cum;
    cum = chWgt[i];
  }
})();

function pickChannel() {
  var r = Math.random();
  for (var i = 0; i < channelCount; i++) { if (r <= chWgt[i]) return i; }
  return channelCount - 1;
}

function bezier(p0, ctrl, p1, t, out) {
  var m = 1 - t;
  out.x = m*m*p0.x + 2*m*t*ctrl.x + t*t*p1.x;
  out.y = m*m*p0.y + 2*m*t*ctrl.y + t*t*p1.y;
  out.z = m*m*p0.z + 2*m*t*ctrl.z + t*t*p1.z;
}

// ════════════════════════════════════════════════════
// 7. PARTICLE SYSTEM — 100k particles, 4 color groups
// ════════════════════════════════════════════════════
var TOTAL   = 100000;
var CHUNK   = 10000;
var NCHUNKS = TOTAL / CHUNK;

// CPU state arrays (typed — minimal GC pressure)
var pChan  = new Uint16Array(TOTAL);
var pProg  = new Float32Array(TOTAL);
var pSpd   = new Float32Array(TOTAL);
var pJit   = new Float32Array(TOTAL);  // small positional jitter offset

// Assign every particle to a weighted channel up front
for (var i = 0; i < TOTAL; i++) {
  var ch = pickChannel();
  pChan[i]  = ch;
  pProg[i]  = Math.random();
  pSpd[i]   = chSpd[ch] * (0.65 + Math.random() * 0.7);
  pJit[i]   = (Math.random() - 0.5) * 0.14;
}

// Split into 4 rendering groups by channel type
var TYPES = ['capital','liquidity','settlement','crypto'];
var typeOf = function(idx) {
  var ch = FLOW_CHANNELS[pChan[idx]];
  return ch ? ch.type : 'capital';
};

// Count per type
var typeCount = {capital:0, liquidity:0, settlement:0, crypto:0};
for (var i = 0; i < TOTAL; i++) typeCount[typeOf(i)]++;

// Build geometry + Points per type
var ptGeo   = {};
var ptPos   = {};
var ptCol   = {};
var ptSiz   = {};
var ptSys   = {};
var ptLocal = new Int32Array(TOTAL);   // local index within type
var ptType  = [];                      // type string per particle

var typeCursor = {capital:0, liquidity:0, settlement:0, crypto:0};
TYPES.forEach(function(t) {
  var n  = typeCount[t];
  var g  = new THREE.BufferGeometry();
  var pos = new Float32Array(n * 3);
  var col = new Float32Array(n * 3);
  var siz = new Float32Array(n);
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  g.setAttribute('size',     new THREE.BufferAttribute(siz, 1));
  var szBase = {capital:1.3, liquidity:1.5, settlement:1.9, crypto:2.1};
  var opBase = {capital:0.82, liquidity:0.84, settlement:0.93, crypto:0.96};
  var pts = new THREE.Points(g, new THREE.PointsMaterial({
    size: szBase[t], vertexColors: true,
    transparent: true, opacity: opBase[t],
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  }));
  pts.frustumCulled = false;
  scene.add(pts);
  ptGeo[t] = g; ptPos[t] = pos; ptCol[t] = col; ptSiz[t] = siz; ptSys[t] = pts;
});

// Assign local indices + set static color + size
for (var i = 0; i < TOTAL; i++) {
  var t = typeOf(i);
  var li = typeCursor[t]++;
  ptType[i]  = t;
  ptLocal[i] = li;
  var c = FLOW_COLORS[t];
  var v = 0.78 + Math.random() * 0.44;
  ptCol[t][li*3]   = Math.min(1, c.r * v);
  ptCol[t][li*3+1] = Math.min(1, c.g * v);
  ptCol[t][li*3+2] = Math.min(1, c.b * v);
  ptSiz[t][li] = 0.4 + Math.random() * 1.4;
}
TYPES.forEach(function(t) {
  ptGeo[t].attributes.color.needsUpdate = true;
  ptGeo[t].attributes.size.needsUpdate  = true;
});

// ════════════════════════════════════════════════════
// 8. SEQUENTIAL CHUNK LOADER
// ════════════════════════════════════════════════════
var loadedChunks  = 0;
var loadComplete  = false;
var loadFill      = document.getElementById('loader-fill');
var loadLabel     = document.getElementById('loader-label');
var loadFrameTick = 0;

function initChunk(ci) {
  var start = ci * CHUNK, end = Math.min(start + CHUNK, TOTAL);
  var tmp = new THREE.Vector3();
  for (var i = start; i < end; i++) {
    var ch = pChan[i];
    if (!chCtrl[ch]) continue;
    var arc = chCtrl[ch];
    bezier(arc[0], arc[1], arc[2], pProg[i], tmp);
    var t  = ptType[i];
    var li = ptLocal[i];
    ptPos[t][li*3]   = tmp.x + pJit[i];
    ptPos[t][li*3+1] = tmp.y;
    ptPos[t][li*3+2] = tmp.z + pJit[i];
  }
  TYPES.forEach(function(t){ ptGeo[t].attributes.position.needsUpdate = true; });
}

function advanceLoader() {
  if (loadComplete) return;
  loadFrameTick++;
  if (loadFrameTick % 2 !== 0) return;
  initChunk(loadedChunks);
  loadedChunks++;
  var pct = loadedChunks / NCHUNKS;
  if (loadFill)  loadFill.style.width  = (pct * 100).toFixed(0) + '%';
  if (loadLabel) loadLabel.textContent = 'Stream ' + loadedChunks + '/' + NCHUNKS + ' — ' + (loadedChunks * CHUNK).toLocaleString() + ' particles active';
  if (loadedChunks >= NCHUNKS) {
    loadComplete = true;
    document.getElementById('loader-bar').style.opacity   = '0';
    document.getElementById('loader-label').style.opacity = '0';
  }
}

// ════════════════════════════════════════════════════
// 9. PARTICLE UPDATE (rolling batch — 5k/frame)
// ════════════════════════════════════════════════════
var updateCursor = 0;
var UPDATE_BATCH = 5000;
var _tmp = new THREE.Vector3();
var GLOBAL_VOL = 1.0, GLOBAL_LIQ = 1.0;

function updateParticles(dt) {
  advanceLoader();
  if (!loadComplete) return;

  var end = Math.min(updateCursor + UPDATE_BATCH, TOTAL);
  for (var i = updateCursor; i < end; i++) {
    var ch = pChan[i];
    if (!chCtrl[ch]) continue;

    pProg[i] += pSpd[i] * dt * 0.042 * GLOBAL_VOL;
    if (pProg[i] > 1.0) {
      pProg[i] -= 1.0;
      // 2% chance: jump to new weighted channel
      if (Math.random() < 0.02) {
        var nc = pickChannel();
        pChan[i] = nc;
        pSpd[i]  = chSpd[nc] * (0.65 + Math.random() * 0.7) * GLOBAL_VOL;
      }
    }

    var arc = chCtrl[pChan[i]];
    if (!arc) continue;
    bezier(arc[0], arc[1], arc[2], pProg[i], _tmp);

    var t  = ptType[i];
    var li = ptLocal[i];
    ptPos[t][li*3]   = _tmp.x + pJit[i];
    ptPos[t][li*3+1] = _tmp.y;
    ptPos[t][li*3+2] = _tmp.z + pJit[i];
  }
  updateCursor = (end >= TOTAL) ? 0 : end;

  TYPES.forEach(function(t){ ptGeo[t].attributes.position.needsUpdate = true; });

  // Sync opacity with global liquidity
  TYPES.forEach(function(t) {
    var base = {capital:0.82, liquidity:0.84, settlement:0.93, crypto:0.96};
    ptSys[t].material.opacity = Math.max(0.25, Math.min(1.0, base[t] * GLOBAL_LIQ));
  });
}

// Market conditions simulation (intraday sine)
function tickMarket(elapsed) {
  GLOBAL_VOL = 0.58 + 0.72 * Math.abs(Math.sin(elapsed * 0.045));
  GLOBAL_LIQ = 0.50 + 0.50 * Math.cos(elapsed * 0.035 + 0.5);
  var statsEl = document.getElementById('stats-bar');
  if (statsEl) {
    statsEl.textContent = 'Volume: ' + (GLOBAL_VOL * 100).toFixed(0) + '%  |  Liquidity: ' + (GLOBAL_LIQ * 100).toFixed(0) + '%  |  Active: ' + (loadedChunks * CHUNK).toLocaleString() + ' streams';
  }
}

// Public API for live wiring
window.setMarketVolume    = function(v){ GLOBAL_VOL = Math.max(0, Math.min(2, v)); };
window.setMarketLiquidity = function(v){ GLOBAL_LIQ = Math.max(0, Math.min(2, v)); };

// ════════════════════════════════════════════════════
// 10. ORBIT CONTROLS (hand-rolled)
// ════════════════════════════════════════════════════
var oc = (function() {
  var el = renderer.domElement;
  var s = {
    orbiting:false, panning:false, lastX:0, lastY:0,
    theta:-0.3, phi:0.88, radius:70,
    target: new THREE.Vector3(0, 4, 0),
    pan:    new THREE.Vector3()
  };
  function upd() {
    var x = s.radius * Math.sin(s.phi) * Math.sin(s.theta);
    var y = s.radius * Math.cos(s.phi);
    var z = s.radius * Math.sin(s.phi) * Math.cos(s.theta);
    camera.position.set(s.target.x + x + s.pan.x, s.target.y + y + s.pan.y, s.target.z + z + s.pan.z);
    camera.lookAt(s.target.x + s.pan.x, s.target.y + s.pan.y, s.target.z + s.pan.z);
  }
  el.addEventListener('mousedown', function(e){
    if (e.button===0) s.orbiting=true;
    if (e.button===2) s.panning=true;
    s.lastX=e.clientX; s.lastY=e.clientY;
  });
  window.addEventListener('mouseup', function(){ s.orbiting=false; s.panning=false; });
  window.addEventListener('mousemove', function(e) {
    var dx=e.clientX-s.lastX, dy=e.clientY-s.lastY;
    s.lastX=e.clientX; s.lastY=e.clientY;
    if (s.orbiting) {
      s.theta -= dx*0.008;
      s.phi = Math.max(0.06, Math.min(1.5, s.phi + dy*0.007));
      upd();
    }
    if (s.panning) {
      var sp = s.radius*0.001;
      var r = new THREE.Vector3(); var u = camera.up.clone();
      r.crossVectors(camera.getWorldDirection(new THREE.Vector3()), u).normalize();
      s.pan.addScaledVector(r, -dx*sp).addScaledVector(u, dy*sp);
      upd();
    }
    mouse.x = (e.clientX/W)*2-1;
    mouse.y = -(e.clientY/H)*2+1;
  });
  el.addEventListener('wheel', function(e){
    s.radius = Math.max(6, Math.min(160, s.radius + e.deltaY*0.08));
    upd(); e.preventDefault();
  },{passive:false});
  el.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  var ltd=0;
  el.addEventListener('touchstart', function(e){
    if (e.touches.length===1){ s.orbiting=true; s.lastX=e.touches[0].clientX; s.lastY=e.touches[0].clientY; }
    else if (e.touches.length===2){ s.orbiting=false; var dx=e.touches[0].clientX-e.touches[1].clientX; var dy=e.touches[0].clientY-e.touches[1].clientY; ltd=Math.sqrt(dx*dx+dy*dy); }
  },{passive:true});
  el.addEventListener('touchmove', function(e){
    if (e.touches.length===1&&s.orbiting){ var dx=e.touches[0].clientX-s.lastX; var dy=e.touches[0].clientY-s.lastY; s.lastX=e.touches[0].clientX; s.lastY=e.touches[0].clientY; s.theta-=dx*0.01; s.phi=Math.max(0.06,Math.min(1.5,s.phi+dy*0.01)); upd(); }
    else if (e.touches.length===2){ var dx=e.touches[0].clientX-e.touches[1].clientX; var dy=e.touches[0].clientY-e.touches[1].clientY; var d=Math.sqrt(dx*dx+dy*dy); s.radius=Math.max(6,Math.min(160,s.radius-(d-ltd)*0.15)); ltd=d; upd(); }
  },{passive:true});
  el.addEventListener('touchend', function(){ s.orbiting=false; },{passive:true});
  // Intro: start pulled back
  s.theta=-1.8; s.phi=1.3; s.radius=115;
  upd();
  return {upd:upd, s:s};
})();

// 11. HOVER / RAYCASTER
// ════════════════════════════════════════════════════
var mouse = new THREE.Vector2(-999, -999);
var ray   = new THREE.Raycaster();
var hoveredMesh = null;
var hudNode   = document.getElementById('hud-node');
var hudDetail = document.getElementById('hud-detail');
function fmtCap(c){ return c>=10000?'$'+(c/1000).toFixed(0)+'T':c>=1000?'$'+(c/1000).toFixed(1)+'T':'$'+c+'B'; }

// ════════════════════════════════════════════════════
// 12. ANIMATE
// ════════════════════════════════════════════════════
var clock  = new THREE.Clock();
var introT = 0, introOK = false;
var INTRO  = 3.8;

function animate() {
  requestAnimationFrame(animate);
  var dt = clock.getDelta();
  var elapsed = clock.getElapsedTime();

  // Cinematic intro
  if (!introOK) {
    introT += dt;
    var p = Math.min(introT / INTRO, 1.0);
    var e = 1 - Math.pow(1-p, 3);
    oc.s.theta  = -1.8 + e * 1.5;
    oc.s.phi    = 1.3  - e * 0.40;
    oc.s.radius = 115  - e * 45;
    oc.upd();
    if (p >= 1.0) introOK = true;
  }

  // Subtle ambient drift
  if (introOK) {
    oc.s.phi += Math.sin(elapsed * 0.06) * 0.00012;
    oc.upd();
  }

  // Market tick + particle update
  tickMarket(elapsed);
  updateParticles(dt);

  // Hover
  ray.setFromCamera(mouse, camera);
  var hits = ray.intersectObjects(meshes);
  if (hits.length > 0) {
    var hit = hits[0].object;
    if (hit !== hoveredMesh) {
      if (hoveredMesh) { hoveredMesh.material.emissive.copy(hoveredMesh._baseEmissive); hoveredMesh.material.emissiveIntensity=1.0; }
      hoveredMesh = hit;
      hit.material.emissive.set(0x2a2018);
      hit.material.emissiveIntensity = 2.8;
      var nd = hit.userData;
      hudNode.textContent   = nd.label;
      hudDetail.textContent = nd.sector + '  \u2022  ' + fmtCap(nd.cap) + ' est. AUM/Cap';
    }
  } else {
    if (hoveredMesh) { hoveredMesh.material.emissive.copy(hoveredMesh._baseEmissive); hoveredMesh.material.emissiveIntensity=1.0; hoveredMesh=null; }
    hudNode.textContent=''; hudDetail.textContent='';
  }

  window.doRender(clock.getElapsedTime());
}

window.addEventListener('resize', function(){
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

// POST-PROCESSING PIPELINE
// Render targets + GLSL fragment shaders + UI panel
// ════════════════════════════════════════════════════════

// ── RENDER TARGET ────────────────────────────────────────
var RT_W = W, RT_H = H;
var renderTarget = new THREE.WebGLRenderTarget(RT_W, RT_H, {
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  format:    THREE.RGBAFormat,
  type:      THREE.UnsignedByteType
});

// Post-processing scene: full-screen quad
var ppScene  = new THREE.Scene();
var ppCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
var ppQuad   = new THREE.Mesh(new THREE.PlaneGeometry(2,2));
ppScene.add(ppQuad);

// ── SHADER DEFS ──────────────────────────────────────────

// Shared vertex shader (passthrough)
var VERT_PASS = [
  'varying vec2 vUv;',
  'void main(){',
  '  vUv = uv;',
  '  gl_Position = vec4(position.xy, 0.0, 1.0);',
  '}'
].join('\n');

// ─── 1. THERMAL VOLATILITY ────────────────────────────────
// FLIR palette: 0→blue, 0.33→cyan, 0.5→green, 0.67→yellow, 1→white
var FRAG_THERMAL = [
  'uniform sampler2D tDiffuse;',
  'uniform float uIntensity;',
  'uniform float uThreshold;',
  'uniform float uContrast;',
  'varying vec2 vUv;',

  'vec3 flirPalette(float t) {',
  '  t = clamp(t, 0.0, 1.0);',
  '  vec3 c;',
  '  if (t < 0.2) {',
  '    c = mix(vec3(0.0,0.0,0.35), vec3(0.0,0.0,1.0), t/0.2);',
  '  } else if (t < 0.4) {',
  '    c = mix(vec3(0.0,0.0,1.0), vec3(0.0,0.85,0.85), (t-0.2)/0.2);',
  '  } else if (t < 0.58) {',
  '    c = mix(vec3(0.0,0.85,0.85), vec3(0.0,0.9,0.0), (t-0.4)/0.18);',
  '  } else if (t < 0.76) {',
  '    c = mix(vec3(0.0,0.9,0.0), vec3(1.0,0.85,0.0), (t-0.58)/0.18);',
  '  } else if (t < 0.90) {',
  '    c = mix(vec3(1.0,0.85,0.0), vec3(1.0,0.15,0.0), (t-0.76)/0.14);',
  '  } else {',
  '    c = mix(vec3(1.0,0.15,0.0), vec3(1.0,1.0,1.0), (t-0.90)/0.10);',
  '  }',
  '  return c;',
  '}',

  'void main(){',
  '  vec4 col = texture2D(tDiffuse, vUv);',
  // Luminance as heat proxy — boost contrast
  '  float lum = dot(col.rgb, vec3(0.299,0.587,0.114));',
  '  float heat = pow(lum, 1.0 / max(0.1, uContrast));',
  // Apply threshold: anything below stays "cold"
  '  float boosted = smoothstep(uThreshold, uThreshold + 0.35, heat);',
  '  boosted = clamp(boosted * uIntensity, 0.0, 1.0);',
  // Scanline overlay (subtle)
  '  float scan = 1.0 - 0.04 * mod(floor(vUv.y * float(480)), 2.0);',
  '  vec3 thermal = flirPalette(boosted) * scan;',
  '  gl_FragColor = vec4(thermal, 1.0);',
  '}'
].join('\n');

// ─── 2. INSTITUTIONAL CRT ─────────────────────────────────
// Phosphor green, scanlines, barrel distortion, pixelation, noise
var FRAG_CRT = [
  'uniform sampler2D tDiffuse;',
  'uniform float uTime;',
  'uniform float uScanlineInt;',   // scanline intensity  0..1
  'uniform float uPixelation;',    // pixel block size    1..8
  'uniform float uFlicker;',       // random flicker amount
  'uniform float uCurvature;',     // barrel curve        0..1
  'varying vec2 vUv;',

  // Barrel distortion
  'vec2 barrel(vec2 uv, float amt){',
  '  vec2 c = uv - 0.5;',
  '  float r2 = dot(c,c);',
  '  return 0.5 + c*(1.0 + amt*r2);',
  '}',

  // Simple hash noise
  'float hash(vec2 p){',
  '  return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);',
  '}',

  'void main(){',
  // Barrel distort
  '  vec2 uv = barrel(vUv, uCurvature * 0.3);',
  // Pixelation
  '  float px = max(1.0, uPixelation);',
  '  vec2 res = vec2(1280.0, 800.0) / px;',
  '  uv = floor(uv * res) / res;',
  // Edge vignette (screen edge darkness)
  '  vec2 vig = uv * (1.0 - uv.yx);',
  '  float vignette = pow(vig.x*vig.y*18.0, 0.35);',
  // Sample
  '  vec4 col = texture2D(tDiffuse, uv);',
  // Convert to phosphor green with luminance
  '  float lum = dot(col.rgb, vec3(0.299,0.587,0.114));',
  // Phosphor color: classic P1 green
  '  vec3 phosphor = lum * vec3(0.08, 1.0, 0.22);',
  // Scanlines
  '  float scanY = sin(vUv.y * 800.0 * 3.14159);',
  '  float scanline = 1.0 - uScanlineInt * (0.5 - 0.5*scanY);',
  // Random row flicker
  '  float rowNoise = hash(vec2(floor(vUv.y*120.0), floor(uTime*8.0)));',
  '  float flick = 1.0 - uFlicker * step(0.96, rowNoise) * 0.6;',
  // Phosphor persistence glow (bloom on luminance)
  '  float glow = lum * 0.3;',
  '  phosphor += vec3(0.0, glow, 0.05);',
  // Noise grain
  '  float grain = hash(vUv + fract(uTime)) * 0.04;',
  '  phosphor += grain * vec3(0.0, 1.0, 0.2);',
  '  phosphor *= scanline * flick * vignette;',
  '  gl_FragColor = vec4(phosphor, 1.0);',
  '}'
].join('\n');

// ─── 3. LIQUIDITY BLOOM ───────────────────────────────────
// Multi-pass bloom: downsample luminance → gaussian blur → additive composite
// Implemented single-pass with large kernel approximation
var FRAG_BLOOM = [
  'uniform sampler2D tDiffuse;',
  'uniform float uBloomStrength;',
  'uniform float uBloomRadius;',
  'uniform float uBloomThreshold;',
  'uniform float uEmissiveBoost;',
  'varying vec2 vUv;',

  'vec3 sampleBlur(sampler2D tex, vec2 uv, float radius, vec2 texelSize){',
  '  vec3 acc = vec3(0.0);',
  '  float total = 0.0;',
  // 13-tap Gaussian approximation
  '  float offsets[7];',
  '  offsets[0] = -3.0; offsets[1] = -2.0; offsets[2] = -1.0;',
  '  offsets[3] =  0.0;',
  '  offsets[4] =  1.0; offsets[5] =  2.0; offsets[6] =  3.0;',
  '  float weights[7];',
  '  weights[0]=0.06; weights[1]=0.12; weights[2]=0.20;',
  '  weights[3]=0.24;',
  '  weights[4]=0.20; weights[5]=0.12; weights[6]=0.06;',
  '  for(int i=0;i<7;i++){',
  '    for(int j=0;j<7;j++){',
  '      vec2 off = vec2(offsets[i], offsets[j]) * texelSize * radius;',
  '      vec3 s = texture2D(tex, uv + off).rgb;',
  '      float w = weights[i] * weights[j];',
  '      acc += s * w;',
  '      total += w;',
  '    }',
  '  }',
  '  return acc / total;',
  '}',

  'void main(){',
  '  vec4 base = texture2D(tDiffuse, vUv);',
  '  vec2 texel = vec2(1.0/1280.0, 1.0/800.0);',

  // Extract bright regions (threshold)
  '  float lum = dot(base.rgb, vec3(0.299,0.587,0.114));',
  '  float bright = smoothstep(uBloomThreshold, uBloomThreshold + 0.25, lum);',

  // Blur the bright regions
  '  vec3 blurred = sampleBlur(tDiffuse, vUv, uBloomRadius * bright + 0.5, texel);',

  // Only blur the bright parts
  '  vec3 bloomColor = blurred * bright * uBloomStrength;',

  // Capital-color tint: gold-to-white based on intensity
  '  float intensity = length(bloomColor);',
  '  vec3 goldTint = mix(vec3(1.0,0.82,0.28), vec3(1.0,1.0,1.0), clamp(intensity*1.5,0.0,1.0));',
  '  bloomColor *= goldTint;',

  // Emissive boost on original dark structures
  '  vec3 emBoost = base.rgb * (1.0 + uEmissiveBoost * bright * 2.0);',

  // Additive composite
  '  vec3 finalColor = emBoost + bloomColor;',
  // Tone-map (Reinhard)
  '  finalColor = finalColor / (finalColor + vec3(1.0));',

// ── NODE → EXCHANGE MAPPING ──────────────────────────────────────────────
// Maps our 3D node IDs to live data identifiers
var DATA_MAP = {
  // Crypto — Binance WS (always open)
  BINANCE:  {exchange:'binance', symbols:['BTCUSDT','ETHUSDT','BNBUSDT'], type:'crypto'},
  COINBASE: {exchange:'binance', symbols:['SOLUSDT','ADAUSDT'],           type:'crypto'},

// ── LIVE DATA STATE ──────────────────────────────────────────────────────
// One record per node: raw values + normalized [0..1] + smoothed
var LIVE = {};
(function initLive() {
  NODES.forEach(function(n) {
    LIVE[n.id] = {
      raw_vol:   0,        // raw trade volume (units vary per source)
      raw_price: 0,        // last price
      raw_size:  0,        // last trade size
      norm_vol:  n.cap / 99000,  // normalized 0..1 (seed from cap)
      norm_price_chg: 0,   // normalized price change -1..1
      smoothed:  n.cap / 99000,  // exponential moving avg
      base_h:    capToHeight(n.cap),  // original height
      live_h:    capToHeight(n.cap),  // live height (lerps to target)
      mesh_idx:  -1,       // index into meshes[]
      cap_idx:   -1,       // index into capMeshes[] — populated below
      last_update: 0       // timestamp
    };
  });
  // Map mesh indices
  meshes.forEach(function(m, i) {
    var id = m.userData && m.userData.id;
    if (id && LIVE[id]) LIVE[id].mesh_idx = i;
  });
})();

// Store cap meshes separately for height tracking
var capMeshes = [];
var capMeshMap = {};  // nodeId → capMesh
// Rebuild cap reference list from scene (they're added right after each main mesh)
(function buildCapMap() {
  var nodeIdx = 0;
  scene.children.forEach(function(obj) {
    if (!obj.isMesh) return;
    // Cap meshes have emissiveIntensity:3.0 set in their material and no userData.id
    if (obj.material && obj.material.emissiveIntensity === 3.0 && !obj.userData.id) {
      if (nodeIdx < NODES.length) {
        var nid = NODES[nodeIdx].id;
        capMeshMap[nid] = obj;
        capMeshes.push({nodeId:nid, mesh:obj});
        nodeIdx++;
      }
    }
  });
  console.log('Cap meshes mapped:', Object.keys(capMeshMap).length);
})();

// ── VOLUME HISTORY (ring buffer for normalization) ───────────────────────
var VOL_HISTORY_LEN = 60;
var volHistory = {};
NODES.forEach(function(n) {
  volHistory[n.id] = new Float32Array(VOL_HISTORY_LEN);
  volHistory[n.id].fill(n.cap / 99000);  // seed with cap-proportional baseline
});
var volHistIdx = {};
NODES.forEach(function(n) { volHistIdx[n.id] = 0; });

function pushVolHistory(nodeId, val) {
  var h = volHistory[nodeId];
  if (!h) return;
  h[volHistIdx[nodeId]] = val;
  volHistIdx[nodeId] = (volHistIdx[nodeId] + 1) % VOL_HISTORY_LEN;
}

function getVolMax(nodeId) {
  var h = volHistory[nodeId];
  if (!h) return 1;
  var m = 0;
  for (var i = 0; i < VOL_HISTORY_LEN; i++) if (h[i] > m) m = h[i];
  return m || 1;
}

// ── NORMALIZER ───────────────────────────────────────────────────────────
// Converts raw exchange data → normalized 0..1 per node
// Uses adaptive normalization: rolling 60-second max as ceiling
var lastQuoteVols = {};  // accumulate trade sizes between ticks
var lastPrices    = {};
NODES.forEach(function(n) { lastQuoteVols[n.id] = 0; lastPrices[n.id] = 0; });

function parseBinanceTrade(nodeId, data) {
  // Binance aggTrade: {p: price, q: quantity, T: timestamp}
  var price = parseFloat(data.p || data.c || 0);
  var qty   = parseFloat(data.q || data.Q || data.v || 0);
  var vol   = price * qty;  // notional USD value

  lastQuoteVols[nodeId] = (lastQuoteVols[nodeId] || 0) + vol;
  lastPrices[nodeId]    = price || lastPrices[nodeId];

  var rec = LIVE[nodeId];
  if (!rec) return;
  rec.raw_vol   = lastQuoteVols[nodeId];
  rec.raw_price = price;
  rec.raw_size  = qty;
  rec.last_update = Date.now();
}

function normalizeAndApply() {
  NODES.forEach(function(n) {
    var rec = LIVE[n.id];
    if (!rec) return;

    // Push current vol to ring buffer
    pushVolHistory(n.id, lastQuoteVols[n.id] || rec.raw_vol || rec.norm_vol);

    // Normalize against rolling 60s max
    var maxVol = getVolMax(n.id);
    var rawNorm = maxVol > 0 ? (lastQuoteVols[n.id] || 0) / maxVol : rec.norm_vol;

    // Blend with cap-based baseline — nodes with 0 live data fall back smoothly
    var capBaseline = rec.base_h / 22;  // 0..1
    var hasLiveData = (Date.now() - rec.last_update) < 8000;  // stale after 8s
    var norm = hasLiveData
      ? (rawNorm * 0.7 + capBaseline * 0.3)
      : capBaseline;
    norm = Math.max(0.04, Math.min(1.0, norm));

    // Exponential smoothing (tau ≈ 1s at 60fps)
    rec.smoothed = rec.smoothed * 0.88 + norm * 0.12;
    rec.norm_vol = norm;

    // Reset accumulator for next tick
    lastQuoteVols[n.id] = 0;
  });
}

// ── VISUAL GRAVITY ENGINE ────────────────────────────────────────────────
// Applies normalized data to: monolith height scale, emissive intensity,
// particle channel weights, and global GLOBAL_VOL / GLOBAL_LIQ
var GRAVITY_LERP = 0.04;  // smooth height transitions

function applyVisualGravity() {
  var totalSmoothed = 0, count = 0;
  var maxSmoothed = 0;

  NODES.forEach(function(n) {
    var rec = LIVE[n.id];
    if (!rec || rec.mesh_idx < 0) return;

    var mesh = meshes[rec.mesh_idx];
    if (!mesh) return;

    totalSmoothed += rec.smoothed;
    count++;
    if (rec.smoothed > maxSmoothed) maxSmoothed = rec.smoothed;

    // Target height: live data drives scale on Y axis
    // Scale range: 0.35x (dormant) to 1.65x (spike)
    var targetScaleY = 0.35 + rec.smoothed * 1.3;

    // Lerp current scale toward target
    var currScaleY = mesh.scale.y || 1.0;
    var newScaleY  = currScaleY + (targetScaleY - currScaleY) * GRAVITY_LERP;
    mesh.scale.y   = newScaleY;

    // Reposition mesh so base stays grounded
    mesh.position.y = (rec.base_h * newScaleY) / 2;

    // Update cap mesh position to track top of monolith
    var capObj = capMeshMap[n.id];
    if (capObj) {
      capObj.position.y = rec.base_h * newScaleY + 0.06;
      // Cap emissive intensity pulses with live volume
      capObj.material.emissiveIntensity = 1.5 + rec.smoothed * 5.5;
    }

    // Monolith body emissive reacts to volume spikes
    var emissiveBoost = rec.smoothed * 0.8;
    var baseEm = mesh._baseEmissive;
    if (baseEm) {
      mesh.material.emissive.setRGB(
        Math.min(0.25, baseEm.r + emissiveBoost * 0.18),
        Math.min(0.25, baseEm.g + emissiveBoost * 0.12),
        Math.min(0.22, baseEm.b + emissiveBoost * 0.10)
      );
    }

    // Update NODE_POS for particle arc origins (top of live monolith)
    NODE_POS[n.id].y = rec.base_h * newScaleY;
  });

  // Rebuild bezier control points for channels affected by height changes
  rebuildArcs();

  // Update global vol/liq from aggregate live data
  if (count > 0) {
    var avgSmoothed = totalSmoothed / count;
    GLOBAL_VOL = 0.4 + avgSmoothed * 1.6;
    GLOBAL_LIQ = 0.35 + maxSmoothed * 0.9;
  }

  // Update channel weights from live node data
  updateChannelWeights();
}

function rebuildArcs() {
  for (var i = 0; i < channelCount; i++) {
    var ch = FLOW_CHANNELS[i];
    var a = NODE_POS[ch.a], b = NODE_POS[ch.b];
    if (!a || !b || !chCtrl[i]) continue;
    // Only update the control point height, keep endpoints
    chCtrl[i][0].copy(a);
    chCtrl[i][2].copy(b);
    var mid = chCtrl[i][1];
    mid.x = (a.x + b.x) / 2;
    mid.z = (a.z + b.z) / 2;
    mid.y = (a.y + b.y) / 2 + a.distanceTo(b) * (0.38 + ch.vol * 0.48);
  }
}

function updateChannelWeights() {
  var total = 0;
  var newWeights = new Float32Array(channelCount);
  for (var i = 0; i < channelCount; i++) {
    var ch = FLOW_CHANNELS[i];
    var volA = LIVE[ch.a] ? LIVE[ch.a].smoothed : ch.vol;
    var volB = LIVE[ch.b] ? LIVE[ch.b].smoothed : ch.liq;
    var w = (volA * 0.6 + volB * 0.4) * ch.vol;
    newWeights[i] = w;
    total += w;
  }
  if (total === 0) return;
  var cum = 0;
  for (var i = 0; i < channelCount; i++) {
    chWgt[i] = newWeights[i] / total + cum;
    cum = chWgt[i];
    // Also update particle speeds for this channel
    chSpd[i] = FLOW_SPEEDS[FLOW_CHANNELS[i].type] * (0.55 + newWeights[i] / total * channelCount * 0.85);
  }
}

// ── BINANCE WEBSOCKET ────────────────────────────────────────────────────
// Binance aggTrade streams — free, no auth, CORS-friendly from browser
var WS_STATUS = {binance: 'disconnected', polygon: 'disconnected'};
var binanceWS = null;
var binanceReconnectTimer = null;
var BINANCE_RECONNECT_DELAY = 3000;

// Symbol → nodeId reverse map
var SYMBOL_TO_NODE = {};
Object.keys(DATA_MAP).forEach(function(nodeId) {
  var def = DATA_MAP[nodeId];
  if (def.exchange === 'binance') {
    def.symbols.forEach(function(sym) {
      SYMBOL_TO_NODE[sym.toLowerCase()] = nodeId;
    });
  }
});

function connectBinance() {
  // Multi-stream: combine all crypto symbols into one WS connection
  var streams = [];
  Object.keys(DATA_MAP).forEach(function(nodeId) {
    var def = DATA_MAP[nodeId];
    if (def.exchange === 'binance') {
      def.symbols.forEach(function(sym) {
        streams.push(sym.toLowerCase() + '@aggTrade');
      });
    }
  });

  var wsUrl = 'wss://stream.binance.com:9443/stream?streams=' + streams.join('/');
  updateDataStatusUI('binance', 'connecting');

  try {
    binanceWS = new WebSocket(wsUrl);
  } catch(e) {
    updateDataStatusUI('binance', 'blocked');
    scheduleSimulation('binance');
    return;
  }

  var connTimeout = setTimeout(function() {
    if (binanceWS && binanceWS.readyState !== WebSocket.OPEN) {
      binanceWS.close();
      updateDataStatusUI('binance', 'timeout');
      scheduleSimulation('binance');
    }
  }, 6000);

  binanceWS.onopen = function() {
    clearTimeout(connTimeout);
    WS_STATUS.binance = 'live';
    updateDataStatusUI('binance', 'live');
    console.log('[WS] Binance connected');
  };

  binanceWS.onmessage = function(evt) {
    try {
      var wrapper = JSON.parse(evt.data);
      var data    = wrapper.data || wrapper;
      var stream  = wrapper.stream || '';
      // Extract symbol from stream name: "btcusdt@aggTrade" → "btcusdt"
      var sym     = stream.split('@')[0];
      var nodeId  = SYMBOL_TO_NODE[sym];
      if (nodeId) parseBinanceTrade(nodeId, data);
    } catch(e) { /* malformed frame — ignore */ }
  };

  binanceWS.onerror = function() {
    clearTimeout(connTimeout);
    WS_STATUS.binance = 'error';
    updateDataStatusUI('binance', 'error');
  };

  binanceWS.onclose = function() {
    clearTimeout(connTimeout);
    if (WS_STATUS.binance !== 'error' && WS_STATUS.binance !== 'timeout') {
      updateDataStatusUI('binance', 'reconnecting');
    }
    // Auto-reconnect
    binanceReconnectTimer = setTimeout(function() {
      if (WS_STATUS.binance !== 'live') connectBinance();
    }, BINANCE_RECONNECT_DELAY);
  };
}

// ── POLYGON.IO REST FALLBACK ─────────────────────────────────────────────
// Free tier: 5 API calls/min. Used for equity nodes when markets are open.
// No API key required for delayed data on free plan.
var POLYGON_BASE = 'https://api.polygon.io/v2/last/trade/';
// NOTE: Free Polygon tier requires API key. We use a public aggregates fallback.
// For equities we poll the Yahoo Finance quote API (truly free, CORS varies).
// YAHOO_BASE replaced by allorigins proxy in pollEquity()
var lastEquityPoll = 0;
var EQUITY_POLL_INTERVAL = 5000;  // poll every 5s (well within free limits)
var equityPollQueue = [];

// Build equity poll list: pick one symbol per equity node
Object.keys(DATA_MAP).forEach(function(nodeId) {
  var def = DATA_MAP[nodeId];
  if (def.exchange === 'equity' && def.symbols.length > 0) {
    equityPollQueue.push({nodeId: nodeId, symbol: def.symbols[0]});
  }
});

var equityPollCursor = 0;

function pollEquity() {
  if (equityPollQueue.length === 0) return;
  var item   = equityPollQueue[equityPollCursor % equityPollQueue.length];
  equityPollCursor++;

  var innerUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/' + item.symbol + '?interval=1m&range=1d';
  var url = 'https://api.allorigins.win/get?url=' + encodeURIComponent(innerUrl);

  fetch(url, {method:'GET'})
    .then(function(r) { return r.json(); })
    .then(function(wrapper) {
      var d;
      try { d = JSON.parse(wrapper.contents || '{}'); } catch(e) { d = {}; }
      try {
        var result = d.chart && d.chart.result && d.chart.result[0];
        if (!result) return;
        var meta = result.meta;
        var price = meta.regularMarketPrice || meta.previousClose || 0;
        var vol   = meta.regularMarketVolume || 0;
        var prevClose = meta.previousClose || price;
        var priceChg  = prevClose > 0 ? (price - prevClose) / prevClose : 0;

        var rec = LIVE[item.nodeId];
        if (!rec) return;

        // Scale volume: equity vol can be millions — normalize to 0-1M range
        var normVol = Math.min(vol / 5000000, 1.0);
        lastQuoteVols[item.nodeId] = (lastQuoteVols[item.nodeId] || 0) + normVol * 10;
        lastPrices[item.nodeId]    = price;
        rec.raw_price   = price;
        rec.raw_vol     = vol;
        rec.norm_price_chg = Math.max(-1, Math.min(1, priceChg * 20));
        rec.last_update = Date.now();

        updateDataStatusUI('polygon', 'live');
      } catch(e) { /* parse error — skip */ }
    })
    .catch(function() {
      updateDataStatusUI('polygon', 'blocked');
      scheduleSimulation('equity');
    });
}

// ── SIMULATION MODE ──────────────────────────────────────────────────────
// Runs when live feeds are unavailable — realistic intraday pattern simulation
var simRunning = {binance: false, equity: false};
var simTimers  = {binance: null,  equity: null};

function scheduleSimulation(source) {
  if (simRunning[source]) return;
  simRunning[source] = true;
  updateDataStatusUI(source, 'simulated');

  var TARGET_NODES = source === 'binance'
    ? ['BINANCE','COINBASE','KRAKEN']
    : Object.keys(DATA_MAP).filter(function(id){ return DATA_MAP[id].exchange === 'equity'; });

  var simT = Math.random() * 100;

  function simTick() {
    simT += 0.08 + Math.random() * 0.04;
    var intradayFactor = 0.5 + 0.6 * Math.abs(Math.sin(simT * 0.04))
                       + 0.3 * Math.abs(Math.sin(simT * 0.13));

    TARGET_NODES.forEach(function(nodeId) {
      var rec = LIVE[nodeId];
      if (!rec) return;
      var baseVol = rec.base_h / 22;
      var spike   = (Math.random() < 0.04) ? (1.5 + Math.random() * 2.0) : 1.0;
      var vol     = baseVol * intradayFactor * spike * (0.7 + Math.random() * 0.6);

      // Feed through same normalizer path
      lastQuoteVols[nodeId] = (lastQuoteVols[nodeId] || 0) + vol * 80;
      rec.last_update = Date.now();
    });

    simTimers[source] = setTimeout(simTick, 200 + Math.random() * 300);
  }
  simTick();
}

// ── MASTER TICK ──────────────────────────────────────────────────────────
// Runs every 1 second — normalizes, applies visual gravity, polls equity REST
var TICK_INTERVAL = 1000;
var tickTimer = null;
var tickCount = 0;

function masterTick() {
  tickCount++;

  // Normalize all accumulated data from the last second
  normalizeAndApply();

  // Apply normalized data → visual gravity
  applyVisualGravity();

  // Equity REST poll (staggered — 1 per tick, rotating)
  var now = Date.now();
  if (now - lastEquityPoll > EQUITY_POLL_INTERVAL) {
    pollEquity();
    lastEquityPoll = now;
  }

  // Update stats bar
  var statusParts = [];
  var liveCount = 0;
  NODES.forEach(function(n) {
    if (LIVE[n.id] && (Date.now() - LIVE[n.id].last_update) < 8000) liveCount++;
  });
  var binStatus = WS_STATUS.binance;
  statusParts.push('Binance: ' + (binStatus === 'live' ? 'LIVE' : binStatus.toUpperCase()));
  statusParts.push('Nodes: ' + liveCount + '/' + NODES.length);
  statusParts.push('Vol: ' + (GLOBAL_VOL * 100).toFixed(0) + '%');
  statusParts.push('Liq: ' + (GLOBAL_LIQ * 100).toFixed(0) + '%');
  statusParts.push('T+' + tickCount + 's');

  var statsEl = document.getElementById('stats-bar');
  if (statsEl) statsEl.textContent = statusParts.join('  \u2022  ');

  tickTimer = setTimeout(masterTick, TICK_INTERVAL);
}

// ── DATA STATUS UI ────────────────────────────────────────────────────────
var _uiStatusCache = {};
function updateDataStatusUI(source, status) {
  if (_uiStatusCache[source] === status) return;
  _uiStatusCache[source] = status;
  WS_STATUS[source] = status;

  var el = document.getElementById('data-status-' + source);
  if (!el) return;
  var colors = {
    live:'rgba(80,220,100,0.85)', connecting:'rgba(220,200,60,0.7)',
    simulated:'rgba(180,140,60,0.7)', error:'rgba(220,60,60,0.7)',
    blocked:'rgba(160,80,60,0.7)',    timeout:'rgba(160,80,60,0.7)',
    reconnecting:'rgba(200,160,40,0.7)'
  };
  el.style.color = colors[status] || 'rgba(255,255,255,0.3)';
  el.textContent = source.charAt(0).toUpperCase() + source.slice(1) + ': ' + status.toUpperCase();
}

// ── OVERRIDE tickMarket (replace sine simulation with live data ticker) ──
window.tickMarket = function(elapsed) {
  // tickMarket is now a no-op — masterTick drives GLOBAL_VOL and GLOBAL_LIQ
  // Keep as fallback if masterTick hasn't started yet
  if (tickCount === 0) {
    GLOBAL_VOL = 0.58 + 0.72 * Math.abs(Math.sin(elapsed * 0.045));
    GLOBAL_LIQ = 0.50 + 0.50 * Math.cos(elapsed * 0.035 + 0.5);
  }
};

// ── DATA PANEL UI ─────────────────────────────────────────────────────────
// Inject a data feed status strip below the stats bar
(function buildDataPanel() {
  var strip = document.createElement('div');
  strip.id  = 'data-strip';
  strip.style.cssText = 'position:fixed;top:28px;left:50%;transform:translateX(-50%);'
    + 'font-family:"Courier New",monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;'
    + 'color:rgba(255,255,255,0.2);z-index:10;display:flex;gap:20px;pointer-events:none;white-space:nowrap;';

  var sources = [
    {id:'binance', label:'Binance WSS'},
    {id:'polygon', label:'Equity REST'},
  ];
  sources.forEach(function(s) {
    var span = document.createElement('span');
    span.id  = 'data-status-' + s.id;
    span.textContent = s.label + ': INIT';
    strip.appendChild(span);
  });

  document.body.appendChild(strip);
})();

// ── LAUNCH SEQUENCE ──────────────────────────────────────────────────────
// Start live feeds with a brief delay to let Three.js finish scene init
setTimeout(function() {
  connectBinance();
  // Start equity polling (immediate first poll)
  pollEquity();
  // Start master tick loop
  masterTick();
}, 1200);

// Public API
window.reconnectBinance = function() {
  if (binanceWS) binanceWS.close();
  connectBinance();
};
window.getLiveNode = function(id) { return LIVE[id]; };
window.getWSStatus = function() { return WS_STATUS; };
window.setGravityLerp = function(v) { GRAVITY_LERP = Math.max(0.005, Math.min(0.3, v)); };


animate(); // start loop after all setup complete
</script>
