<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Financial Cityscape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
#c{display:block;width:100vw;height:100vh}
#hud{
  position:fixed;top:0;left:0;right:0;
  padding:16px 24px;
  display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;z-index:10;
}
#hud-left{display:flex;flex-direction:column;gap:4px}
#hud-title{
  font-size:11px;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;color:rgba(255,255,255,0.9);
}
#hud-sub{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase}
#hud-right{text-align:right}
#hud-node{
  font-size:13px;font-weight:700;letter-spacing:1px;
  color:#fff;margin-bottom:3px;min-height:18px;
}
#hud-detail{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.4);min-height:13px}
#hud-controls{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.25);pointer-events:none;z-index:10;
  text-align:center;
}
#scan-line{
  position:fixed;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(180,180,160,0.15),transparent);
  animation:scan 8s linear infinite;pointer-events:none;z-index:5;
}
@keyframes scan{from{top:0}to{top:100vh}}
#crosshair{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;z-index:10;
  opacity:0.15;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scan-line"></div>
<div id="hud">
  <div id="hud-left">
    <div id="hud-title">&#9670; Financial Grid</div>
    <div id="hud-sub">Market Infrastructure &bull; Live Architecture</div>
  </div>
  <div id="hud-right">
    <div id="hud-node"></div>
    <div id="hud-detail"></div>
  </div>
</div>
<div id="hud-controls">Drag to orbit &nbsp;&bull;&nbsp; Scroll to zoom &nbsp;&bull;&nbsp; Right-drag to pan</div>
<svg id="crosshair" width="24" height="24" viewBox="0 0 24 24">
  <line x1="12" y1="0" x2="12" y2="8" stroke="white" stroke-width="1"/>
  <line x1="12" y1="16" x2="12" y2="24" stroke="white" stroke-width="1"/>
  <line x1="0" y1="12" x2="8" y2="12" stroke="white" stroke-width="1"/>
  <line x1="16" y1="12" x2="24" y2="12" stroke="white" stroke-width="1"/>
</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
var NODES = [
  // EXCHANGES
  {id:'NYSE',      label:'NYSE',           type:'cube',     cap:25400, sector:'Exchange',  x:0,   z:0},
  {id:'NASDAQ',    label:'NASDAQ',         type:'cube',     cap:22100, sector:'Exchange',  x:8,   z:2},
  {id:'CME',       label:'CME Group',      type:'cube',     cap:7800,  sector:'Exchange',  x:-8,  z:1},
  {id:'CBOE',      label:'CBOE',           type:'cube',     cap:4200,  sector:'Exchange',  x:4,   z:-6},
  {id:'ICE',       label:'ICE',            type:'cube',     cap:6900,  sector:'Exchange',  x:-4,  z:5},
  {id:'LSE',       label:'London Stock Ex',type:'cube',     cap:5800,  sector:'Exchange',  x:14,  z:-3},
  {id:'TSE',       label:'Tokyo Stock Ex', type:'cube',     cap:9200,  sector:'Exchange',  x:-14, z:-4},
  {id:'HKEX',      label:'Hong Kong Ex',   type:'cube',     cap:6100,  sector:'Exchange',  x:12,  z:8},
  {id:'BINANCE',   label:'Binance',        type:'cylinder', cap:3200,  sector:'Crypto',    x:6,   z:10},
  {id:'COINBASE',  label:'Coinbase',       type:'cylinder', cap:1800,  sector:'Crypto',    x:-6,  z:10},
  {id:'KRAKEN',    label:'Kraken',         type:'cylinder', cap:900,   sector:'Crypto',    x:0,   z:14},
  // CENTRAL BANKS
  {id:'FED',       label:'Federal Reserve',type:'cube',     cap:99000, sector:'CentralBank',x:-2, z:-10},
  {id:'ECB',       label:'ECB',            type:'cube',     cap:72000, sector:'CentralBank',x:10, z:-10},
  {id:'BOJ',       label:'Bank of Japan',  type:'cube',     cap:68000, sector:'CentralBank',x:-12,z:-10},
  {id:'BOE',       label:'Bank of England',type:'cube',     cap:48000, sector:'CentralBank',x:18, z:-10},
  {id:'PBOC',      label:'PBOC',           type:'cube',     cap:61000, sector:'CentralBank',x:-18,z:-8},
  // BANKS
  {id:'JPM',       label:'JPMorgan',       type:'cube',     cap:5800,  sector:'Bank',      x:18,  z:4},
  {id:'BAC',       label:'Bank of America',type:'cube',     cap:3200,  sector:'Bank',      x:18,  z:10},
  {id:'GS',        label:'Goldman Sachs',  type:'cube',     cap:1800,  sector:'Bank',      x:22,  z:0},
  {id:'MS',        label:'Morgan Stanley', type:'cube',     cap:1600,  sector:'Bank',      x:22,  z:6},
  {id:'WFC',       label:'Wells Fargo',    type:'cube',     cap:1900,  sector:'Bank',      x:22,  z:12},
  {id:'C',         label:'Citigroup',      type:'cube',     cap:1200,  sector:'Bank',      x:26,  z:4},
  {id:'HSBC',      label:'HSBC',           type:'cube',     cap:1700,  sector:'Bank',      x:26,  z:10},
  {id:'BCS',       label:'Barclays',       type:'cube',     cap:800,   sector:'Bank',      x:26,  z:16},
  // ASSET MANAGERS
  {id:'BLK',       label:'BlackRock',      type:'cylinder', cap:12000, sector:'AssetMgr',  x:-18, z:4},
  {id:'VANG',      label:'Vanguard',       type:'cylinder', cap:8000,  sector:'AssetMgr',  x:-18, z:10},
  {id:'FIDO',      label:'Fidelity',       type:'cylinder', cap:5500,  sector:'AssetMgr',  x:-22, z:2},
  {id:'SSGA',      label:'State Street',   type:'cylinder', cap:4200,  sector:'AssetMgr',  x:-22, z:8},
  {id:'BRK',       label:'Berkshire',      type:'cylinder', cap:9800,  sector:'AssetMgr',  x:-18, z:16},
  {id:'APO',       label:'Apollo',         type:'cylinder', cap:3100,  sector:'AssetMgr',  x:-22, z:14},
  // CLEARING / INFRASTRUCTURE
  {id:'DTC',       label:'DTCC',           type:'cube',     cap:18000, sector:'Infra',     x:-8,  z:-16},
  {id:'SWIFT',     label:'SWIFT',          type:'cube',     cap:14000, sector:'Infra',     x:0,   z:-18},
  {id:'FIS',       label:'FIS',            type:'cylinder', cap:4100,  sector:'Infra',     x:8,   z:-16},
  {id:'VISA',      label:'Visa',           type:'cylinder', cap:5600,  sector:'Infra',     x:16,  z:-16},
  {id:'MC',        label:'Mastercard',     type:'cylinder', cap:4700,  sector:'Infra',     x:22,  z:-14},
];

// Sector color palette — metallic, no pure white
var SECTOR_COLORS = {
  Exchange:    {h:0,   emissive:0x1a0000, base:0x3a1a1a},
  CentralBank: {h:240, emissive:0x00001a, base:0x1a1a3a},
  Bank:        {h:200, emissive:0x00101a, base:0x0a1a2a},
  AssetMgr:    {h:45,  emissive:0x1a1000, base:0x2a2010},
  Crypto:      {h:160, emissive:0x001a0a, base:0x0a2a1a},
  Infra:       {h:280, emissive:0x100010, base:0x1a0a2a},
};

// ─── INIT ────────────────────────────────────────────────────────────────────
var W = window.innerWidth, H = window.innerHeight;
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x020202, 0.018);

var camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 800);
camera.position.set(0, 28, 42);
camera.lookAt(0, 0, 0);

var renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;

// ─── LIGHTING ────────────────────────────────────────────────────────────────
// Ambient — very low, cold
var ambientLight = new THREE.AmbientLight(0x080c10, 0.6);
scene.add(ambientLight);

// Key light — cold overhead
var keyLight = new THREE.DirectionalLight(0x9ab0c0, 1.2);
keyLight.position.set(20, 60, 20);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 200;
keyLight.shadow.camera.left = -80;
keyLight.shadow.camera.right = 80;
keyLight.shadow.camera.top = 80;
keyLight.shadow.camera.bottom = -80;
scene.add(keyLight);

// Rim light — warm, low angle
var rimLight = new THREE.DirectionalLight(0xc08050, 0.4);
rimLight.position.set(-30, 10, -20);
scene.add(rimLight);

// Ground bounce — very subtle
var bounceLight = new THREE.HemisphereLight(0x101820, 0x060608, 0.5);
scene.add(bounceLight);

// ─── GROUND PLANE ────────────────────────────────────────────────────────────
var groundGeo = new THREE.PlaneGeometry(200, 200, 60, 60);
var groundMat = new THREE.MeshStandardMaterial({
  color: 0x0a0a08,
  roughness: 0.95,
  metalness: 0.1,
  wireframe: false
});
var ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid overlay on ground
var gridHelper = new THREE.GridHelper(200, 80, 0x1a1a14, 0x0f0f0c);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ─── MONOLITHS ───────────────────────────────────────────────────────────────
var CAP_MIN = Math.min.apply(null, NODES.map(function(n){return n.cap;}));
var CAP_MAX = Math.max.apply(null, NODES.map(function(n){return n.cap;}));

function capToHeight(cap) {
  var t = Math.pow((cap - CAP_MIN) / (CAP_MAX - CAP_MIN), 0.45);
  return 0.8 + t * 22;
}

function capToWidth(cap) {
  var t = Math.pow((cap - CAP_MIN) / (CAP_MAX - CAP_MIN), 0.3);
  return 0.6 + t * 1.8;
}

var meshes = [];
var raycaster = new THREE.Raycaster();
var mouse = new THREE.Vector2(-999, -999);

NODES.forEach(function(node) {
  var h = capToHeight(node.cap);
  var w = capToWidth(node.cap);
  var sc = SECTOR_COLORS[node.sector] || SECTOR_COLORS.Bank;

  var geo;
  if (node.type === 'cylinder') {
    geo = new THREE.CylinderGeometry(w * 0.45, w * 0.5, h, 12, 1);
  } else {
    // Cube with slight taper — more architectural
    var shape = new THREE.BoxGeometry(w, h, w);
    geo = shape;
  }

  var mat = new THREE.MeshStandardMaterial({
    color: sc.base,
    emissive: sc.emissive,
    roughness: 0.35,
    metalness: 0.85,
    envMapIntensity: 1.0
  });

  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(node.x * 2.2, h / 2, node.z * 2.2);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = node;
  mesh._baseEmissive = new THREE.Color(sc.emissive);
  mesh._baseColor = new THREE.Color(sc.base);
  scene.add(mesh);
  meshes.push(mesh);

  // Top cap — slightly brighter
  var capH = Math.max(0.06, h * 0.025);
  var capGeo;
  if (node.type === 'cylinder') {
    capGeo = new THREE.CylinderGeometry(w * 0.46, w * 0.46, capH, 12);
  } else {
    capGeo = new THREE.BoxGeometry(w * 1.02, capH, w * 1.02);
  }
  var capMat = new THREE.MeshStandardMaterial({
    color: 0x303028,
    emissive: sc.emissive,
    emissiveIntensity: 3.0,
    roughness: 0.2,
    metalness: 0.95
  });
  var capMesh = new THREE.Mesh(capGeo, capMat);
  capMesh.position.set(node.x * 2.2, h + capH / 2, node.z * 2.2);
  scene.add(capMesh);

  // Vertical edge light lines — thin geometry
  if (node.type === 'cube') {
    var edgeGeo = new THREE.EdgesGeometry(geo);
    var edgeMat = new THREE.LineBasicMaterial({
      color: 0x202018,
      transparent: true,
      opacity: 0.4
    });
    var edges = new THREE.LineSegments(edgeGeo, edgeMat);
    edges.position.copy(mesh.position);
    scene.add(edges);
  }
});

// ─── SECTOR LABELS (floating planes as stand-ins) ────────────────────────────
// Add faint connecting lines between nodes in the same sector
var LINE_MAT = new THREE.LineBasicMaterial({
  color: 0x1a1a14,
  transparent: true,
  opacity: 0.25
});

var sectorGroups = {};
NODES.forEach(function(n) {
  if (!sectorGroups[n.sector]) sectorGroups[n.sector] = [];
  sectorGroups[n.sector].push(n);
});

Object.keys(sectorGroups).forEach(function(sec) {
  var group = sectorGroups[sec];
  if (group.length < 2) return;
  // Connect each to centroid
  var cx = group.reduce(function(s,n){return s+n.x;},0)/group.length;
  var cz = group.reduce(function(s,n){return s+n.z;},0)/group.length;
  group.forEach(function(n) {
    var h = capToHeight(n.cap);
    var pts = [
      new THREE.Vector3(cx * 2.2, 1, cz * 2.2),
      new THREE.Vector3(n.x * 2.2, 1, n.z * 2.2)
    ];
    var lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
    var line = new THREE.Line(lineGeo, LINE_MAT);
    scene.add(line);
  });
});

// ─── ORBIT CONTROLS (manual implementation — no import needed) ────────────────
var controls = (function() {
  var el = renderer.domElement;
  var state = {
    orbiting: false, panning: false,
    lastX: 0, lastY: 0,
    theta: -0.3, phi: 0.9,
    radius: 70,
    target: new THREE.Vector3(0, 4, 0),
    panOffset: new THREE.Vector3()
  };

  var THETA_MIN = -Math.PI, THETA_MAX = Math.PI;
  var PHI_MIN = 0.08, PHI_MAX = 1.48;
  var RADIUS_MIN = 8, RADIUS_MAX = 160;

  function updateCamera() {
    var x = state.radius * Math.sin(state.phi) * Math.sin(state.theta);
    var y = state.radius * Math.cos(state.phi);
    var z = state.radius * Math.sin(state.phi) * Math.cos(state.theta);
    camera.position.set(
      state.target.x + x + state.panOffset.x,
      state.target.y + y + state.panOffset.y,
      state.target.z + z + state.panOffset.z
    );
    camera.lookAt(
      state.target.x + state.panOffset.x,
      state.target.y + state.panOffset.y,
      state.target.z + state.panOffset.z
    );
  }

  el.addEventListener('mousedown', function(e) {
    if (e.button === 0) { state.orbiting = true; }
    if (e.button === 2) { state.panning = true; }
    state.lastX = e.clientX;
    state.lastY = e.clientY;
  });

  window.addEventListener('mouseup', function() {
    state.orbiting = false;
    state.panning = false;
  });

  window.addEventListener('mousemove', function(e) {
    var dx = e.clientX - state.lastX;
    var dy = e.clientY - state.lastY;
    state.lastX = e.clientX;
    state.lastY = e.clientY;

    if (state.orbiting) {
      state.theta -= dx * 0.008;
      state.phi = Math.max(PHI_MIN, Math.min(PHI_MAX, state.phi + dy * 0.007));
      updateCamera();
    }
    if (state.panning) {
      var panSpeed = state.radius * 0.001;
      var right = new THREE.Vector3();
      var up = new THREE.Vector3();
      right.crossVectors(camera.getWorldDirection(new THREE.Vector3()), camera.up).normalize();
      up.copy(camera.up);
      state.panOffset.addScaledVector(right, -dx * panSpeed);
      state.panOffset.addScaledVector(up, dy * panSpeed);
      updateCamera();
    }

    // Update mouse for raycaster
    mouse.x = (e.clientX / W) * 2 - 1;
    mouse.y = -(e.clientY / H) * 2 + 1;
  });

  el.addEventListener('wheel', function(e) {
    state.radius = Math.max(RADIUS_MIN, Math.min(RADIUS_MAX, state.radius + e.deltaY * 0.08));
    updateCamera();
    e.preventDefault();
  }, {passive:false});

  el.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  // Touch support
  var lastTouchDist = 0;
  el.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      state.orbiting = true;
      state.lastX = e.touches[0].clientX;
      state.lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      state.orbiting = false;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      lastTouchDist = Math.sqrt(dx*dx + dy*dy);
    }
  },{passive:true});

  el.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1 && state.orbiting) {
      var dx = e.touches[0].clientX - state.lastX;
      var dy = e.touches[0].clientY - state.lastY;
      state.lastX = e.touches[0].clientX;
      state.lastY = e.touches[0].clientY;
      state.theta -= dx * 0.01;
      state.phi = Math.max(PHI_MIN, Math.min(PHI_MAX, state.phi + dy * 0.01));
      updateCamera();
    } else if (e.touches.length === 2) {
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      var dist = Math.sqrt(dx*dx+dy*dy);
      state.radius = Math.max(RADIUS_MIN, Math.min(RADIUS_MAX, state.radius - (dist - lastTouchDist) * 0.15));
      lastTouchDist = dist;
      updateCamera();
    }
  },{passive:true});

  el.addEventListener('touchend', function(){ state.orbiting = false; },{passive:true});

  updateCamera();
  return { updateCamera: updateCamera, state: state };
})();

// ─── HOVER / RAYCASTING ──────────────────────────────────────────────────────
var hoveredMesh = null;
var hudNode = document.getElementById('hud-node');
var hudDetail = document.getElementById('hud-detail');

var HOVER_EMISSIVE = new THREE.Color(0x2a2010);

function formatCap(cap) {
  if (cap >= 10000) return '$' + (cap/1000).toFixed(0) + 'T';
  if (cap >= 1000) return '$' + (cap/1000).toFixed(1) + 'T';
  return '$' + cap.toFixed(0) + 'B';
}

// ─── ANIMATION ───────────────────────────────────────────────────────────────
var clock = new THREE.Clock();
var frame = 0;

// Intro cinematic — slow orbit in
var introComplete = false;
var introT = 0;
var INTRO_DURATION = 4.0;
controls.state.theta = -1.8;
controls.state.phi = 1.3;
controls.state.radius = 120;
controls.updateCamera();

function animate() {
  requestAnimationFrame(animate);
  var delta = clock.getDelta();
  frame++;

  // Cinematic intro
  if (!introComplete) {
    introT += delta;
    var progress = Math.min(introT / INTRO_DURATION, 1.0);
    var ease = 1 - Math.pow(1 - progress, 3);
    controls.state.theta = -1.8 + ease * 1.5;
    controls.state.phi = 1.3 - ease * 0.38;
    controls.state.radius = 120 - ease * 50;
    controls.updateCamera();
    if (progress >= 1.0) introComplete = true;
  }

  // Subtle ambient camera drift (post-intro)
  if (introComplete) {
    var t = clock.getElapsedTime();
    controls.state.phi += Math.sin(t * 0.07) * 0.00015;
    controls.updateCamera();
  }

  // Raycasting for hover
  raycaster.setFromCamera(mouse, camera);
  var intersects = raycaster.intersectObjects(meshes);

  if (intersects.length > 0) {
    var hit = intersects[0].object;
    if (hit !== hoveredMesh) {
      if (hoveredMesh) {
        hoveredMesh.material.emissive.copy(hoveredMesh._baseEmissive);
        hoveredMesh.material.emissiveIntensity = 1.0;
      }
      hoveredMesh = hit;
      hoveredMesh.material.emissive.set(0x2a2018);
      hoveredMesh.material.emissiveIntensity = 2.5;
      var nd = hit.userData;
      hudNode.textContent = nd.label;
      hudDetail.textContent = nd.sector + '  \u2022  ' + formatCap(nd.cap) + ' est. AUM/Cap';
    }
  } else {
    if (hoveredMesh) {
      hoveredMesh.material.emissive.copy(hoveredMesh._baseEmissive);
      hoveredMesh.material.emissiveIntensity = 1.0;
      hoveredMesh = null;
    }
    hudNode.textContent = '';
    hudDetail.textContent = '';
  }

  // Pulse the cap lights — very subtle
  var pulse = 0.85 + Math.sin(clock.getElapsedTime() * 1.4) * 0.08;
  scene.traverse(function(obj) {
    if (obj.isMesh && obj.material && obj.material.emissiveIntensity > 2.0 && obj !== hoveredMesh) {
      obj.material.emissiveIntensity = 2.8 * pulse;
    }
  });

  renderer.render(scene, camera);
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', function() {
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

animate();
</script>
</body>
</html>
