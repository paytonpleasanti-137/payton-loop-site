<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Financial Cityscape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
#c{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
#hud-left{display:flex;flex-direction:column;gap:4px}
#hud-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.9)}
#hud-sub{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-transform:uppercase}
#hud-right{text-align:right}
#hud-node{font-size:13px;font-weight:700;letter-spacing:1px;color:#fff;margin-bottom:3px;min-height:18px}
#hud-detail{font-size:9px;letter-spacing:1.5px;color:rgba(255,255,255,0.4);min-height:13px}
#hud-controls{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);pointer-events:none;z-index:10;text-align:center}
#scan-line{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(180,180,160,0.12),transparent);animation:scan 9s linear infinite;pointer-events:none;z-index:5}
@keyframes scan{from{top:0}to{top:100vh}}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;opacity:0.12}
#loader-bar{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);width:220px;height:1px;background:rgba(255,255,255,0.06);z-index:20}
#loader-fill{height:100%;width:0%;background:rgba(200,185,120,0.7)}
#loader-label{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);z-index:20;white-space:nowrap;text-align:center}
#flow-legend{position:fixed;bottom:56px;right:20px;font-family:'Courier New',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);z-index:10;line-height:2;text-align:right;pointer-events:none}
#stats-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.22);z-index:10;padding:10px 0;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="scan-line"></div>
<div id="hud">
  <div id="hud-left">
    <div id="hud-title">&#9670; Financial Grid</div>
    <div id="hud-sub">Market Infrastructure &bull; Live Architecture</div>
  </div>
  <div id="hud-right">
    <div id="hud-node"></div>
    <div id="hud-detail"></div>
  </div>
</div>
<div id="stats-bar" id="stats-bar">Initializing&hellip;</div>
<div id="hud-controls">Drag &mdash; Orbit &nbsp;&bull;&nbsp; Scroll &mdash; Zoom &nbsp;&bull;&nbsp; Right-drag &mdash; Pan</div>
<div id="loader-bar"><div id="loader-fill"></div></div>
<div id="loader-label">Allocating particle streams&hellip;</div>
<div id="flow-legend">
  <span style="color:rgba(255,210,90,0.6)">&#9632;</span> Capital Flow<br>
  <span style="color:rgba(100,195,255,0.6)">&#9632;</span> Liquidity<br>
  <span style="color:rgba(255,110,80,0.6)">&#9632;</span> Settlement<br>
  <span style="color:rgba(90,255,150,0.6)">&#9632;</span> Crypto
</div>
<svg id="crosshair" width="22" height="22" viewBox="0 0 22 22">
  <line x1="11" y1="0" x2="11" y2="7" stroke="white" stroke-width="0.8"/>
  <line x1="11" y1="15" x2="11" y2="22" stroke="white" stroke-width="0.8"/>
  <line x1="0" y1="11" x2="7" y2="11" stroke="white" stroke-width="0.8"/>
  <line x1="15" y1="11" x2="22" y2="11" stroke="white" stroke-width="0.8"/>
</svg>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ════════════════════════════════════════════════════
// 0. SCENE BOOTSTRAP
// ════════════════════════════════════════════════════
var W = window.innerWidth, H = window.innerHeight;
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.FogExp2(0x020202, 0.016);

var camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 800);
camera.position.set(0, 28, 42);
camera.lookAt(0, 0, 0);

var renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;

// ════════════════════════════════════════════════════
// 1. LIGHTS
// ════════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0x080c10, 0.6));
var keyLight = new THREE.DirectionalLight(0x9ab0c0, 1.2);
keyLight.position.set(20, 60, 20);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.left = -80; keyLight.shadow.camera.right = 80;
keyLight.shadow.camera.top = 80;   keyLight.shadow.camera.bottom = -80;
keyLight.shadow.camera.far = 200;
scene.add(keyLight);
scene.add(new THREE.DirectionalLight(0xc08050, 0.4)).position.set(-30,10,-20);
scene.add(new THREE.HemisphereLight(0x101820, 0x060608, 0.5));

// ════════════════════════════════════════════════════
// 2. GROUND + GRID
// ════════════════════════════════════════════════════
var groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({color:0x0a0a08, roughness:0.95, metalness:0.1})
);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);
var grid = new THREE.GridHelper(200, 80, 0x181812, 0x0e0e0a);
grid.position.y = 0.01;
scene.add(grid);

// ════════════════════════════════════════════════════
// 3. NODE DATA
// ════════════════════════════════════════════════════
var NODES = [
  {id:'NYSE',    label:'NYSE',            type:'cube',     cap:25400, sector:'Exchange',   x:0,   z:0},
  {id:'NASDAQ',  label:'NASDAQ',          type:'cube',     cap:22100, sector:'Exchange',   x:8,   z:2},
  {id:'CME',     label:'CME Group',       type:'cube',     cap:7800,  sector:'Exchange',   x:-8,  z:1},
  {id:'CBOE',    label:'CBOE',            type:'cube',     cap:4200,  sector:'Exchange',   x:4,   z:-6},
  {id:'ICE',     label:'ICE',             type:'cube',     cap:6900,  sector:'Exchange',   x:-4,  z:5},
  {id:'LSE',     label:'London Stock Ex', type:'cube',     cap:5800,  sector:'Exchange',   x:14,  z:-3},
  {id:'TSE',     label:'Tokyo Stock Ex',  type:'cube',     cap:9200,  sector:'Exchange',   x:-14, z:-4},
  {id:'HKEX',    label:'Hong Kong Ex',    type:'cube',     cap:6100,  sector:'Exchange',   x:12,  z:8},
  {id:'BINANCE', label:'Binance',         type:'cylinder', cap:3200,  sector:'Crypto',     x:6,   z:10},
  {id:'COINBASE',label:'Coinbase',        type:'cylinder', cap:1800,  sector:'Crypto',     x:-6,  z:10},
  {id:'KRAKEN',  label:'Kraken',          type:'cylinder', cap:900,   sector:'Crypto',     x:0,   z:14},
  {id:'FED',     label:'Federal Reserve', type:'cube',     cap:99000, sector:'CentralBank',x:-2,  z:-10},
  {id:'ECB',     label:'ECB',             type:'cube',     cap:72000, sector:'CentralBank',x:10,  z:-10},
  {id:'BOJ',     label:'Bank of Japan',   type:'cube',     cap:68000, sector:'CentralBank',x:-12, z:-10},
  {id:'BOE',     label:'Bank of England', type:'cube',     cap:48000, sector:'CentralBank',x:18,  z:-10},
  {id:'PBOC',    label:'PBOC',            type:'cube',     cap:61000, sector:'CentralBank',x:-18, z:-8},
  {id:'JPM',     label:'JPMorgan',        type:'cube',     cap:5800,  sector:'Bank',       x:18,  z:4},
  {id:'BAC',     label:'Bank of America', type:'cube',     cap:3200,  sector:'Bank',       x:18,  z:10},
  {id:'GS',      label:'Goldman Sachs',   type:'cube',     cap:1800,  sector:'Bank',       x:22,  z:0},
  {id:'MS',      label:'Morgan Stanley',  type:'cube',     cap:1600,  sector:'Bank',       x:22,  z:6},
  {id:'WFC',     label:'Wells Fargo',     type:'cube',     cap:1900,  sector:'Bank',       x:22,  z:12},
  {id:'C',       label:'Citigroup',       type:'cube',     cap:1200,  sector:'Bank',       x:26,  z:4},
  {id:'HSBC',    label:'HSBC',            type:'cube',     cap:1700,  sector:'Bank',       x:26,  z:10},
  {id:'BCS',     label:'Barclays',        type:'cube',     cap:800,   sector:'Bank',       x:26,  z:16},
  {id:'BLK',     label:'BlackRock',       type:'cylinder', cap:12000, sector:'AssetMgr',   x:-18, z:4},
  {id:'VANG',    label:'Vanguard',        type:'cylinder', cap:8000,  sector:'AssetMgr',   x:-18, z:10},
  {id:'FIDO',    label:'Fidelity',        type:'cylinder', cap:5500,  sector:'AssetMgr',   x:-22, z:2},
  {id:'SSGA',    label:'State Street',    type:'cylinder', cap:4200,  sector:'AssetMgr',   x:-22, z:8},
  {id:'BRK',     label:'Berkshire',       type:'cylinder', cap:9800,  sector:'AssetMgr',   x:-18, z:16},
  {id:'APO',     label:'Apollo',          type:'cylinder', cap:3100,  sector:'AssetMgr',   x:-22, z:14},
  {id:'DTC',     label:'DTCC',            type:'cube',     cap:18000, sector:'Infra',      x:-8,  z:-16},
  {id:'SWIFT',   label:'SWIFT',           type:'cube',     cap:14000, sector:'Infra',      x:0,   z:-18},
  {id:'FIS',     label:'FIS',             type:'cylinder', cap:4100,  sector:'Infra',      x:8,   z:-16},
  {id:'VISA',    label:'Visa',            type:'cylinder', cap:5600,  sector:'Infra',      x:16,  z:-16},
  {id:'MC',      label:'Mastercard',      type:'cylinder', cap:4700,  sector:'Infra',      x:22,  z:-14},
];

var SECTOR_COLORS = {
  Exchange:    {base:0x3a1a1a, emissive:0x1a0000},
  CentralBank: {base:0x1a1a3a, emissive:0x00001a},
  Bank:        {base:0x0a1a2a, emissive:0x00101a},
  AssetMgr:    {base:0x2a2010, emissive:0x1a1000},
  Crypto:      {base:0x0a2a1a, emissive:0x001a0a},
  Infra:       {base:0x1a0a2a, emissive:0x100010},
};

var CAP_MIN = 800, CAP_MAX = 99000;
function capToHeight(cap) {
  var t = Math.pow((cap - CAP_MIN) / (CAP_MAX - CAP_MIN), 0.45);
  return 0.8 + t * 22;
}
function capToWidth(cap) {
  var t = Math.pow((cap - CAP_MIN) / (CAP_MAX - CAP_MIN), 0.3);
  return 0.6 + t * 1.8;
}

// ════════════════════════════════════════════════════
// 4. BUILD MONOLITHS + NODE POSITION MAP
// ════════════════════════════════════════════════════
var meshes = [];
var NODE_POS = {};

NODES.forEach(function(node) {
  var h = capToHeight(node.cap);
  var w = capToWidth(node.cap);
  var sc = SECTOR_COLORS[node.sector] || SECTOR_COLORS.Bank;

  var geo = node.type === 'cylinder'
    ? new THREE.CylinderGeometry(w*0.45, w*0.5, h, 12, 1)
    : new THREE.BoxGeometry(w, h, w);

  var mat = new THREE.MeshStandardMaterial({
    color: sc.base, emissive: sc.emissive,
    roughness: 0.35, metalness: 0.85
  });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(node.x*2.2, h/2, node.z*2.2);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = node;
  mesh._baseEmissive = new THREE.Color(sc.emissive);
  scene.add(mesh);
  meshes.push(mesh);

  // Top cap
  var capH = Math.max(0.06, h*0.025);
  var capGeo = node.type === 'cylinder'
    ? new THREE.CylinderGeometry(w*0.46, w*0.46, capH, 12)
    : new THREE.BoxGeometry(w*1.02, capH, w*1.02);
  var capMesh = new THREE.Mesh(capGeo, new THREE.MeshStandardMaterial({
    color:0x303028, emissive:sc.emissive, emissiveIntensity:3.0, roughness:0.2, metalness:0.95
  }));
  capMesh.position.set(node.x*2.2, h+capH/2, node.z*2.2);
  scene.add(capMesh);

  if (node.type === 'cube') {
    var edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({color:0x1e1e16, transparent:true, opacity:0.35})
    );
    edges.position.copy(mesh.position);
    scene.add(edges);
  }

  // Store top-center world position for arc origins
  NODE_POS[node.id] = new THREE.Vector3(node.x*2.2, h, node.z*2.2);
});

// Sector centroid connection lines
var sectorGroups = {};
NODES.forEach(function(n){ (sectorGroups[n.sector] = sectorGroups[n.sector]||[]).push(n); });
var lineMat = new THREE.LineBasicMaterial({color:0x1a1a12, transparent:true, opacity:0.2});
Object.keys(sectorGroups).forEach(function(sec) {
  var grp = sectorGroups[sec];
  if (grp.length < 2) return;
  var cx = grp.reduce(function(s,n){return s+n.x;},0)/grp.length;
  var cz = grp.reduce(function(s,n){return s+n.z;},0)/grp.length;
  grp.forEach(function(n) {
    var pts = [new THREE.Vector3(cx*2.2,1,cz*2.2), new THREE.Vector3(n.x*2.2,1,n.z*2.2)];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
  });
});

// ════════════════════════════════════════════════════
// 5. FLOW CHANNELS
// ════════════════════════════════════════════════════
var FLOW_CHANNELS = [
  {a:'FED',    b:'NYSE',     vol:0.95, liq:0.90, type:'settlement'},
  {a:'FED',    b:'NASDAQ',   vol:0.88, liq:0.85, type:'settlement'},
  {a:'FED',    b:'SWIFT',    vol:0.98, liq:0.95, type:'settlement'},
  {a:'ECB',    b:'LSE',      vol:0.82, liq:0.80, type:'settlement'},
  {a:'BOJ',    b:'TSE',      vol:0.79, liq:0.75, type:'settlement'},
  {a:'PBOC',   b:'HKEX',    vol:0.75, liq:0.72, type:'settlement'},
  {a:'NYSE',   b:'DTC',      vol:0.92, liq:0.88, type:'capital'},
  {a:'NASDAQ', b:'DTC',      vol:0.89, liq:0.86, type:'capital'},
  {a:'CME',    b:'DTC',      vol:0.78, liq:0.75, type:'capital'},
  {a:'CBOE',   b:'DTC',      vol:0.65, liq:0.62, type:'capital'},
  {a:'LSE',    b:'SWIFT',    vol:0.71, liq:0.68, type:'capital'},
  {a:'HKEX',   b:'SWIFT',   vol:0.68, liq:0.65, type:'capital'},
  {a:'JPM',    b:'NYSE',     vol:0.85, liq:0.82, type:'capital'},
  {a:'GS',     b:'NYSE',     vol:0.80, liq:0.76, type:'capital'},
  {a:'MS',     b:'NASDAQ',   vol:0.75, liq:0.72, type:'capital'},
  {a:'BAC',    b:'NYSE',     vol:0.72, liq:0.70, type:'capital'},
  {a:'JPM',    b:'SWIFT',    vol:0.78, liq:0.80, type:'capital'},
  {a:'HSBC',   b:'LSE',      vol:0.70, liq:0.68, type:'capital'},
  {a:'C',      b:'NYSE',     vol:0.68, liq:0.65, type:'capital'},
  {a:'BLK',    b:'NYSE',     vol:0.88, liq:0.85, type:'liquidity'},
  {a:'VANG',   b:'NASDAQ',   vol:0.85, liq:0.82, type:'liquidity'},
  {a:'FIDO',   b:'NYSE',     vol:0.80, liq:0.78, type:'liquidity'},
  {a:'BRK',    b:'NYSE',     vol:0.75, liq:0.72, type:'liquidity'},
  {a:'SSGA',   b:'NYSE',     vol:0.72, liq:0.70, type:'liquidity'},
  {a:'APO',    b:'NYSE',     vol:0.55, liq:0.52, type:'liquidity'},
  {a:'BINANCE',b:'COINBASE', vol:0.82, liq:0.78, type:'crypto'},
  {a:'KRAKEN', b:'COINBASE', vol:0.60, liq:0.58, type:'crypto'},
  {a:'BINANCE',b:'NASDAQ',   vol:0.45, liq:0.42, type:'crypto'},
  {a:'VISA',   b:'NYSE',     vol:0.88, liq:0.85, type:'capital'},
  {a:'MC',     b:'NYSE',     vol:0.85, liq:0.82, type:'capital'},
  {a:'FIS',    b:'DTC',      vol:0.72, liq:0.70, type:'capital'},
  {a:'VISA',   b:'JPM',      vol:0.80, liq:0.78, type:'capital'},
  {a:'MC',     b:'BAC',      vol:0.75, liq:0.72, type:'capital'},
  {a:'NYSE',   b:'LSE',      vol:0.60, liq:0.58, type:'capital'},
  {a:'NASDAQ', b:'TSE',      vol:0.55, liq:0.52, type:'capital'},
];

var FLOW_COLORS = {
  capital:    new THREE.Color(0.90, 0.80, 0.28),
  liquidity:  new THREE.Color(0.28, 0.74, 1.00),
  settlement: new THREE.Color(1.00, 0.40, 0.26),
  crypto:     new THREE.Color(0.40, 1.00, 0.52),
};
var FLOW_SPEEDS = {capital:1.4, liquidity:1.9, settlement:2.4, crypto:3.0};

// ════════════════════════════════════════════════════
// 6. PRECOMPUTE CHANNEL BEZIER DATA
// ════════════════════════════════════════════════════
var channelCount = FLOW_CHANNELS.length;
var chCtrl = [];   // [p0,ctrl,p1] for each channel
var chSpd  = [];   // base speed
var chWgt  = [];   // cumulative normalized weight

(function() {
  var total = 0;
  for (var i = 0; i < channelCount; i++) {
    var ch = FLOW_CHANNELS[i];
    var a = NODE_POS[ch.a], b = NODE_POS[ch.b];
    if (!a || !b) { chCtrl.push(null); chSpd.push(0); chWgt.push(0); continue; }
    var mid = new THREE.Vector3((a.x+b.x)/2, (a.y+b.y)/2, (a.z+b.z)/2);
    mid.y += a.distanceTo(b) * (0.38 + ch.vol * 0.48);
    chCtrl.push([a.clone(), mid, b.clone()]);
    chSpd.push(FLOW_SPEEDS[ch.type] * (0.55 + ch.vol * 0.85));
    var w = ch.vol * ch.liq;
    chWgt.push(w);
    total += w;
  }
  var cum = 0;
  for (var i = 0; i < channelCount; i++) {
    chWgt[i] = (chWgt[i] / total) + cum;
    cum = chWgt[i];
  }
})();

function pickChannel() {
  var r = Math.random();
  for (var i = 0; i < channelCount; i++) { if (r <= chWgt[i]) return i; }
  return channelCount - 1;
}

function bezier(p0, ctrl, p1, t, out) {
  var m = 1 - t;
  out.x = m*m*p0.x + 2*m*t*ctrl.x + t*t*p1.x;
  out.y = m*m*p0.y + 2*m*t*ctrl.y + t*t*p1.y;
  out.z = m*m*p0.z + 2*m*t*ctrl.z + t*t*p1.z;
}

// ════════════════════════════════════════════════════
// 7. PARTICLE SYSTEM — 100k particles, 4 color groups
// ════════════════════════════════════════════════════
var TOTAL   = 100000;
var CHUNK   = 10000;
var NCHUNKS = TOTAL / CHUNK;

// CPU state arrays (typed — minimal GC pressure)
var pChan  = new Uint16Array(TOTAL);
var pProg  = new Float32Array(TOTAL);
var pSpd   = new Float32Array(TOTAL);
var pJit   = new Float32Array(TOTAL);  // small positional jitter offset

// Assign every particle to a weighted channel up front
for (var i = 0; i < TOTAL; i++) {
  var ch = pickChannel();
  pChan[i]  = ch;
  pProg[i]  = Math.random();
  pSpd[i]   = chSpd[ch] * (0.65 + Math.random() * 0.7);
  pJit[i]   = (Math.random() - 0.5) * 0.14;
}

// Split into 4 rendering groups by channel type
var TYPES = ['capital','liquidity','settlement','crypto'];
var typeOf = function(idx) {
  var ch = FLOW_CHANNELS[pChan[idx]];
  return ch ? ch.type : 'capital';
};

// Count per type
var typeCount = {capital:0, liquidity:0, settlement:0, crypto:0};
for (var i = 0; i < TOTAL; i++) typeCount[typeOf(i)]++;

// Build geometry + Points per type
var ptGeo   = {};
var ptPos   = {};
var ptCol   = {};
var ptSiz   = {};
var ptSys   = {};
var ptLocal = new Int32Array(TOTAL);   // local index within type
var ptType  = [];                      // type string per particle

var typeCursor = {capital:0, liquidity:0, settlement:0, crypto:0};
TYPES.forEach(function(t) {
  var n  = typeCount[t];
  var g  = new THREE.BufferGeometry();
  var pos = new Float32Array(n * 3);
  var col = new Float32Array(n * 3);
  var siz = new Float32Array(n);
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  g.setAttribute('size',     new THREE.BufferAttribute(siz, 1));
  var szBase = {capital:1.3, liquidity:1.5, settlement:1.9, crypto:2.1};
  var opBase = {capital:0.82, liquidity:0.84, settlement:0.93, crypto:0.96};
  var pts = new THREE.Points(g, new THREE.PointsMaterial({
    size: szBase[t], vertexColors: true,
    transparent: true, opacity: opBase[t],
    sizeAttenuation: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  }));
  pts.frustumCulled = false;
  scene.add(pts);
  ptGeo[t] = g; ptPos[t] = pos; ptCol[t] = col; ptSiz[t] = siz; ptSys[t] = pts;
});

// Assign local indices + set static color + size
for (var i = 0; i < TOTAL; i++) {
  var t = typeOf(i);
  var li = typeCursor[t]++;
  ptType[i]  = t;
  ptLocal[i] = li;
  var c = FLOW_COLORS[t];
  var v = 0.78 + Math.random() * 0.44;
  ptCol[t][li*3]   = Math.min(1, c.r * v);
  ptCol[t][li*3+1] = Math.min(1, c.g * v);
  ptCol[t][li*3+2] = Math.min(1, c.b * v);
  ptSiz[t][li] = 0.4 + Math.random() * 1.4;
}
TYPES.forEach(function(t) {
  ptGeo[t].attributes.color.needsUpdate = true;
  ptGeo[t].attributes.size.needsUpdate  = true;
});

// ════════════════════════════════════════════════════
// 8. SEQUENTIAL CHUNK LOADER
// ════════════════════════════════════════════════════
var loadedChunks  = 0;
var loadComplete  = false;
var loadFill      = document.getElementById('loader-fill');
var loadLabel     = document.getElementById('loader-label');
var loadFrameTick = 0;

function initChunk(ci) {
  var start = ci * CHUNK, end = Math.min(start + CHUNK, TOTAL);
  var tmp = new THREE.Vector3();
  for (var i = start; i < end; i++) {
    var ch = pChan[i];
    if (!chCtrl[ch]) continue;
    var arc = chCtrl[ch];
    bezier(arc[0], arc[1], arc[2], pProg[i], tmp);
    var t  = ptType[i];
    var li = ptLocal[i];
    ptPos[t][li*3]   = tmp.x + pJit[i];
    ptPos[t][li*3+1] = tmp.y;
    ptPos[t][li*3+2] = tmp.z + pJit[i];
  }
  TYPES.forEach(function(t){ ptGeo[t].attributes.position.needsUpdate = true; });
}

function advanceLoader() {
  if (loadComplete) return;
  loadFrameTick++;
  if (loadFrameTick % 2 !== 0) return;
  initChunk(loadedChunks);
  loadedChunks++;
  var pct = loadedChunks / NCHUNKS;
  if (loadFill)  loadFill.style.width  = (pct * 100).toFixed(0) + '%';
  if (loadLabel) loadLabel.textContent = 'Stream ' + loadedChunks + '/' + NCHUNKS + ' — ' + (loadedChunks * CHUNK).toLocaleString() + ' particles active';
  if (loadedChunks >= NCHUNKS) {
    loadComplete = true;
    document.getElementById('loader-bar').style.opacity   = '0';
    document.getElementById('loader-label').style.opacity = '0';
  }
}

// ════════════════════════════════════════════════════
// 9. PARTICLE UPDATE (rolling batch — 5k/frame)
// ════════════════════════════════════════════════════
var updateCursor = 0;
var UPDATE_BATCH = 5000;
var _tmp = new THREE.Vector3();
var GLOBAL_VOL = 1.0, GLOBAL_LIQ = 1.0;

function updateParticles(dt) {
  advanceLoader();
  if (!loadComplete) return;

  var end = Math.min(updateCursor + UPDATE_BATCH, TOTAL);
  for (var i = updateCursor; i < end; i++) {
    var ch = pChan[i];
    if (!chCtrl[ch]) continue;

    pProg[i] += pSpd[i] * dt * 0.042 * GLOBAL_VOL;
    if (pProg[i] > 1.0) {
      pProg[i] -= 1.0;
      // 2% chance: jump to new weighted channel
      if (Math.random() < 0.02) {
        var nc = pickChannel();
        pChan[i] = nc;
        pSpd[i]  = chSpd[nc] * (0.65 + Math.random() * 0.7) * GLOBAL_VOL;
      }
    }

    var arc = chCtrl[pChan[i]];
    if (!arc) continue;
    bezier(arc[0], arc[1], arc[2], pProg[i], _tmp);

    var t  = ptType[i];
    var li = ptLocal[i];
    ptPos[t][li*3]   = _tmp.x + pJit[i];
    ptPos[t][li*3+1] = _tmp.y;
    ptPos[t][li*3+2] = _tmp.z + pJit[i];
  }
  updateCursor = (end >= TOTAL) ? 0 : end;

  TYPES.forEach(function(t){ ptGeo[t].attributes.position.needsUpdate = true; });

  // Sync opacity with global liquidity
  TYPES.forEach(function(t) {
    var base = {capital:0.82, liquidity:0.84, settlement:0.93, crypto:0.96};
    ptSys[t].material.opacity = Math.max(0.25, Math.min(1.0, base[t] * GLOBAL_LIQ));
  });
}

// Market conditions simulation (intraday sine)
function tickMarket(elapsed) {
  GLOBAL_VOL = 0.58 + 0.72 * Math.abs(Math.sin(elapsed * 0.045));
  GLOBAL_LIQ = 0.50 + 0.50 * Math.cos(elapsed * 0.035 + 0.5);
  var statsEl = document.getElementById('stats-bar');
  if (statsEl) {
    statsEl.textContent = 'Volume: ' + (GLOBAL_VOL * 100).toFixed(0) + '%  |  Liquidity: ' + (GLOBAL_LIQ * 100).toFixed(0) + '%  |  Active: ' + (loadedChunks * CHUNK).toLocaleString() + ' streams';
  }
}

// Public API for live wiring
window.setMarketVolume    = function(v){ GLOBAL_VOL = Math.max(0, Math.min(2, v)); };
window.setMarketLiquidity = function(v){ GLOBAL_LIQ = Math.max(0, Math.min(2, v)); };

// ════════════════════════════════════════════════════
// 10. ORBIT CONTROLS (hand-rolled)
// ════════════════════════════════════════════════════
var oc = (function() {
  var el = renderer.domElement;
  var s = {
    orbiting:false, panning:false, lastX:0, lastY:0,
    theta:-0.3, phi:0.88, radius:70,
    target: new THREE.Vector3(0, 4, 0),
    pan:    new THREE.Vector3()
  };
  function upd() {
    var x = s.radius * Math.sin(s.phi) * Math.sin(s.theta);
    var y = s.radius * Math.cos(s.phi);
    var z = s.radius * Math.sin(s.phi) * Math.cos(s.theta);
    camera.position.set(s.target.x + x + s.pan.x, s.target.y + y + s.pan.y, s.target.z + z + s.pan.z);
    camera.lookAt(s.target.x + s.pan.x, s.target.y + s.pan.y, s.target.z + s.pan.z);
  }
  el.addEventListener('mousedown', function(e){
    if (e.button===0) s.orbiting=true;
    if (e.button===2) s.panning=true;
    s.lastX=e.clientX; s.lastY=e.clientY;
  });
  window.addEventListener('mouseup', function(){ s.orbiting=false; s.panning=false; });
  window.addEventListener('mousemove', function(e) {
    var dx=e.clientX-s.lastX, dy=e.clientY-s.lastY;
    s.lastX=e.clientX; s.lastY=e.clientY;
    if (s.orbiting) {
      s.theta -= dx*0.008;
      s.phi = Math.max(0.06, Math.min(1.5, s.phi + dy*0.007));
      upd();
    }
    if (s.panning) {
      var sp = s.radius*0.001;
      var r = new THREE.Vector3(); var u = camera.up.clone();
      r.crossVectors(camera.getWorldDirection(new THREE.Vector3()), u).normalize();
      s.pan.addScaledVector(r, -dx*sp).addScaledVector(u, dy*sp);
      upd();
    }
    mouse.x = (e.clientX/W)*2-1;
    mouse.y = -(e.clientY/H)*2+1;
  });
  el.addEventListener('wheel', function(e){
    s.radius = Math.max(6, Math.min(160, s.radius + e.deltaY*0.08));
    upd(); e.preventDefault();
  },{passive:false});
  el.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  var ltd=0;
  el.addEventListener('touchstart', function(e){
    if (e.touches.length===1){ s.orbiting=true; s.lastX=e.touches[0].clientX; s.lastY=e.touches[0].clientY; }
    else if (e.touches.length===2){ s.orbiting=false; var dx=e.touches[0].clientX-e.touches[1].clientX; var dy=e.touches[0].clientY-e.touches[1].clientY; ltd=Math.sqrt(dx*dx+dy*dy); }
  },{passive:true});
  el.addEventListener('touchmove', function(e){
    if (e.touches.length===1&&s.orbiting){ var dx=e.touches[0].clientX-s.lastX; var dy=e.touches[0].clientY-s.lastY; s.lastX=e.touches[0].clientX; s.lastY=e.touches[0].clientY; s.theta-=dx*0.01; s.phi=Math.max(0.06,Math.min(1.5,s.phi+dy*0.01)); upd(); }
    else if (e.touches.length===2){ var dx=e.touches[0].clientX-e.touches[1].clientX; var dy=e.touches[0].clientY-e.touches[1].clientY; var d=Math.sqrt(dx*dx+dy*dy); s.radius=Math.max(6,Math.min(160,s.radius-(d-ltd)*0.15)); ltd=d; upd(); }
  },{passive:true});
  el.addEventListener('touchend', function(){ s.orbiting=false; },{passive:true});
  // Intro: start pulled back
  s.theta=-1.8; s.phi=1.3; s.radius=115;
  upd();
  return {upd:upd, s:s};
})();

// ════════════════════════════════════════════════════
// 11. HOVER / RAYCASTER
// ════════════════════════════════════════════════════
var mouse = new THREE.Vector2(-999, -999);
var ray   = new THREE.Raycaster();
var hoveredMesh = null;
var hudNode   = document.getElementById('hud-node');
var hudDetail = document.getElementById('hud-detail');
function fmtCap(c){ return c>=10000?'$'+(c/1000).toFixed(0)+'T':c>=1000?'$'+(c/1000).toFixed(1)+'T':'$'+c+'B'; }

// ════════════════════════════════════════════════════
// 12. ANIMATE
// ════════════════════════════════════════════════════
var clock  = new THREE.Clock();
var introT = 0, introOK = false;
var INTRO  = 3.8;

function animate() {
  requestAnimationFrame(animate);
  var dt = clock.getDelta();
  var elapsed = clock.getElapsedTime();

  // Cinematic intro
  if (!introOK) {
    introT += dt;
    var p = Math.min(introT / INTRO, 1.0);
    var e = 1 - Math.pow(1-p, 3);
    oc.s.theta  = -1.8 + e * 1.5;
    oc.s.phi    = 1.3  - e * 0.40;
    oc.s.radius = 115  - e * 45;
    oc.upd();
    if (p >= 1.0) introOK = true;
  }

  // Subtle ambient drift
  if (introOK) {
    oc.s.phi += Math.sin(elapsed * 0.06) * 0.00012;
    oc.upd();
  }

  // Market tick + particle update
  tickMarket(elapsed);
  updateParticles(dt);

  // Hover
  ray.setFromCamera(mouse, camera);
  var hits = ray.intersectObjects(meshes);
  if (hits.length > 0) {
    var hit = hits[0].object;
    if (hit !== hoveredMesh) {
      if (hoveredMesh) { hoveredMesh.material.emissive.copy(hoveredMesh._baseEmissive); hoveredMesh.material.emissiveIntensity=1.0; }
      hoveredMesh = hit;
      hit.material.emissive.set(0x2a2018);
      hit.material.emissiveIntensity = 2.8;
      var nd = hit.userData;
      hudNode.textContent   = nd.label;
      hudDetail.textContent = nd.sector + '  \u2022  ' + fmtCap(nd.cap) + ' est. AUM/Cap';
    }
  } else {
    if (hoveredMesh) { hoveredMesh.material.emissive.copy(hoveredMesh._baseEmissive); hoveredMesh.material.emissiveIntensity=1.0; hoveredMesh=null; }
    hudNode.textContent=''; hudDetail.textContent='';
  }

  renderer.render(scene, camera);
}

window.addEventListener('resize', function(){
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

animate();
</script>
